function PageMentorStudents() {
  const s = useStore();
  const { students } = useMentorScope();
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [q, setQ] = React.useState('');
  const [selectedId, setSelectedId] = React.useState(null);
  const [sortKey, setSortKey] = React.useState('score');
  const [sortDir, setSortDir] = React.useState('desc');

  const filtered = students
    .filter(x => (statusFilter === 'all' || x.status === statusFilter) && x.name.toLowerCase().includes(q.toLowerCase()))
    .sort((a, b) => {
      const va = a[sortKey], vb = b[sortKey];
      const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
      return sortDir === 'desc' ? -cmp : cmp;
    });

  const selected = students.find(x => x.id === selectedId);
  const setSort = (k) => {
    if (k === sortKey) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(k); setSortDir('desc'); }
  };
  const SortHeader = ({ k, children, align }) => (
    <th onClick={() => setSort(k)} style={{
      textAlign: align || 'left', padding: '11px 16px', fontSize: 11.5, fontWeight: 600,
      color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em', cursor: 'pointer',
      userSelect: 'none', whiteSpace: 'nowrap',
    }}>
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
        {children}
        {sortKey === k && (sortDir === 'desc' ? <Icons.chevdown size={12} /> : <Icons.chevup size={12} />)}
      </span>
    </th>
  );

  return (
    <AppShell breadcrumb={['Mentor', 'Talabalar']}>
      <PageTitle title="Talabalar" desc={`Sizning ${students.length} ta talabangiz — qatorga bosing batafsil ko‘rish uchun`} />

      <Card padding={12} style={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <Input value={q} onChange={e => setQ(e.target.value)} placeholder="Ism bo'yicha qidirish..." icon={<Icons.search size={14} />} />
          <Tabs value={statusFilter} onChange={setStatusFilter} items={[
            { id: 'all',         label: 'Hammasi',     count: students.length },
            { id: 'GRANTED',     label: 'Grant',       count: students.filter(x => x.status === 'GRANTED').length },
            { id: 'PENDING',     label: 'Kutilmoqda',  count: students.filter(x => x.status === 'PENDING').length },
            { id: 'NOT_GRANTED', label: 'Grant yo‘q', count: students.filter(x => x.status === 'NOT_GRANTED').length },
          ]} />
        </div>
      </Card>

      <Card padding={0}>
        {filtered.length === 0 ? <Empty icon={Icons.search} title="Hech narsa topilmadi" /> : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: T.bg, borderBottom: `1px solid ${T.border}` }}>
                <SortHeader k="name">Talaba</SortHeader>
                <SortHeader k="group">Guruh</SortHeader>
                <SortHeader k="gpa"        align="right">GPA</SortHeader>
                <SortHeader k="attendance" align="right">Davomat</SortHeader>
                <SortHeader k="score"      align="right">Ball</SortHeader>
                <th style={{ textAlign: 'left', padding: '11px 16px', fontSize: 11.5, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em' }}>Status</th>
                <th style={{ width: 40 }} />
              </tr>
            </thead>
            <tbody>
              {filtered.map((stu, i) => (
                <tr key={stu.id} onClick={() => setSelectedId(stu.id)} style={{
                  borderBottom: i < filtered.length - 1 ? `1px solid ${T.border}` : 'none',
                  cursor: 'pointer', transition: 'background .12s',
                }}
                onMouseEnter={(e) => e.currentTarget.style.background = T.bg}
                onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                >
                  <td style={{ padding: '11px 16px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <Avatar name={stu.name} color={stu.avatarColor} size={30} />
                      <div>
                        <div style={{ fontWeight: 500 }}>{stu.name}</div>
                        <div style={{ fontSize: 11.5, color: T.textMuted }}>{stu.email}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{ padding: '11px 16px', color: T.textMuted }}>{stu.group}</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: stu.gpa < 80 ? T.redDeep : T.text }}>{stu.gpa}%</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: stu.attendance < 75 ? T.redDeep : T.text }}>{stu.attendance}%</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right', fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{stu.score}</td>
                  <td style={{ padding: '11px 16px' }}><Badge status={stu.status} /></td>
                  <td style={{ padding: '11px 16px', color: T.textSubtle }}><Icons.chevron size={14} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>

      {/* Student detail sheet */}

        title={selected?.name}

  );

// =========================================
// PAGE: Mentor Discipline (replaces Attendance)
// Davomat va akademik ball'lar LMS'dan keladi.
// Mentor faqat intizom bahosini qo'yadi (0-10).
// =========================================
function PageMentorDiscipline() {
  const s = useStore();
  const { students } = useMentorScope();
  const [group, setGroup] = React.useState(ME_MENTOR.groups[0]);
  const groupStudents = students.filter(x => x.group === group);

  // Local edit state — initial values from breakdown.discipline
  const initialFor = (stu) => stu.breakdown ? stu.breakdown.discipline : 8;
  const [scores, setScores] = React.useState(() => {
    const acc = {};
    students.forEach(x => { acc[x.id] = initialFor(x); });
    return acc;
  });
  const [notes, setNotes] = React.useState({});
  const [dirty, setDirty] = React.useState(false);

  React.useEffect(() => {
    // re-init when students change
    setScores(prev => {
      const next = { ...prev };
      students.forEach(x => { if (next[x.id] == null) next[x.id] = initialFor(x); });
      return next;
    });
  }, [students.length]);

  const setOne = (id, v) => {
    setScores(p => ({ ...p, [id]: Math.max(0, Math.min(10, Number(v) || 0)) }));
    setDirty(true);
  };
  const setNote = (id, v) => {
    setNotes(p => ({ ...p, [id]: v }));
    setDirty(true);
  };
  const setAll = (v) => {
    setScores(p => {
      const next = { ...p };
      groupStudents.forEach(stu => { next[stu.id] = v; });
      return next;
    });
    setDirty(true);
  };

  const save = () => {
    s.toast({ kind: 'success', title: 'Intizom baholari saqlandi', description: `${group} guruhi · ${groupStudents.length} ta talaba` });
    setDirty(false);
  };

  const avg = groupStudents.length
    ? (groupStudents.reduce((a, x) => a + (scores[x.id] ?? 0), 0) / groupStudents.length).toFixed(1)
    : '0.0';

  // Color a 0-10 score
  const tone = (v) => v >= 9 ? T.emerald : v >= 7 ? T.amber : T.red;
  const toneBg = (v) => v >= 9 ? T.emeraldBg : v >= 7 ? T.amberBg : T.redBg;

  return (
    <AppShell breadcrumb={['Mentor', 'Intizom bahosi']}>
      <PageTitle
        title={
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
            Intizom bahosi
            <Tooltip content="Korporativ madaniyat va intizom — akademik halollik, dars intizomi, dress code, yotoqxona tartibi · Nizom 2026.1 mezon 6 · 10 ball">
              <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 18, height: 18, borderRadius: 999, background: T.bgSubtle, color: T.textMuted, cursor: 'help' }}>
                <Icons.info size={11} />
              </span>
            </Tooltip>
          </span>
        }
        desc="Har talaba uchun intizom darajasini 0-10 ball bilan baholang · max 10 ball grant nizomida"
        actions={
          <>
            <Button variant="outline" size="sm" onClick={() => setAll(8)} icon={<Icons.refresh size={13} />}>Hammasi 8.0</Button>
            <Button variant="outline" size="sm" onClick={() => setAll(10)} icon={<Icons.check size={13} />}>Hammasi 10</Button>
          </>
        }
      />

      <Card padding={14} style={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', gap: 14, alignItems: 'center', flexWrap: 'wrap' }}>
          <Select value={group} onChange={setGroup} options={ME_MENTOR.groups} fullWidth={false} style={{ width: 170 }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12.5, color: T.textMuted }}>
            <span>Guruh o‘rtacha:</span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '3px 10px', borderRadius: 6, background: toneBg(parseFloat(avg)), color: tone(parseFloat(avg)), fontWeight: 700, fontSize: 13 }}>
              {avg} / 10
            </span>
          </div>
          <div style={{ marginLeft: 'auto', fontSize: 12, color: T.textSubtle, display: 'flex', alignItems: 'center', gap: 14 }}>
            <span><Icons.info size={11} style={{ marginRight: 4, verticalAlign: 'middle' }} />Davomat va GPA — LMS'dan keladi, qo'lda kiritilmaydi</span>
          </div>
        </div>
      </Card>

      <Card padding={0} style={{ paddingBottom: 80 }}>
        <div style={{
          padding: '10px 18px', borderBottom: `1px solid ${T.border}`, background: T.bg,
          display: 'grid', gridTemplateColumns: '24px 1fr 110px 170px 1fr', gap: 12,
          fontSize: 10.5, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em',
        }}>
          <span>#</span><span>Talaba</span><span style={{ textAlign: 'right' }}>LMS davomat</span><span style={{ textAlign: 'center' }}>Intizom (0–10)</span><span>Izoh (ixtiyoriy)</span>
        </div>

        {groupStudents.map((stu, i) => {
          const cur = scores[stu.id] ?? initialFor(stu);
          return (
            <div key={stu.id} style={{
              padding: '12px 18px', borderBottom: i < groupStudents.length - 1 ? `1px solid ${T.border}` : 'none',
              display: 'grid', gridTemplateColumns: '24px 1fr 110px 170px 1fr', gap: 12, alignItems: 'center',
            }}>
              <span style={{ fontSize: 12, color: T.textSubtle, textAlign: 'right' }}>{i + 1}</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
                <Avatar name={stu.name} color={stu.avatarColor} size={32} />
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 500 }}>{stu.name}</div>
                  <div style={{ fontSize: 11.5, color: T.textMuted }}>GPA <span style={{ fontWeight: 500 }}>{stu.gpa}%</span> · Ball <span style={{ fontWeight: 500 }}>{stu.breakdown?.finalScore ?? stu.score}</span></div>
                </div>
              </div>
              <div style={{ textAlign: 'right', fontSize: 13, fontWeight: 500, color: stu.attendance < 75 ? T.redDeep : T.text, fontVariantNumeric: 'tabular-nums' }}>
                {stu.attendance}%
              </div>
              {/* Score slider */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <input type="range" min={0} max={10} step={0.5} value={cur}
                  onChange={e => setOne(stu.id, e.target.value)}
                  style={{ flex: 1, accentColor: tone(cur) }} />
                <span style={{
                  minWidth: 46, textAlign: 'center', padding: '3px 8px',
                  background: toneBg(cur), color: tone(cur), borderRadius: 6,
                  fontWeight: 700, fontSize: 13, fontVariantNumeric: 'tabular-nums',
                }}>
                  {cur.toFixed ? cur.toFixed(1) : Number(cur).toFixed(1)}
                </span>
              </div>
              <Input size="sm" placeholder="Masalan: Sinfda yordamchi, faol" value={notes[stu.id] || ''} onChange={e => setNote(stu.id, e.target.value)} />
            </div>
          );
        })}

        {groupStudents.length === 0 && <Empty icon={Icons.users} title="Bu guruhda talaba yo'q" />}
      </Card>

      {/* Save bar (sticky bottom) */}
      <div style={{
        position: 'sticky', bottom: 0, marginTop: -78, padding: '14px 18px',
        background: 'rgba(255,255,255,.92)', backdropFilter: 'blur(8px)',
        borderTop: `1px solid ${T.border}`, borderRadius: 12,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div style={{ fontSize: 12.5, color: T.textMuted }}>
          {dirty
            ? <span style={{ color: T.amberDeep, fontWeight: 500 }}>● Saqlanmagan o‘zgarishlar bor</span>
            : <span>O‘zgarish yo‘q</span>}
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <Button variant="outline" onClick={() => setDirty(false)}>Bekor qilish</Button>
          <Button variant="primary" onClick={save} disabled={!dirty} icon={<Icons.check size={14} />}>Saqlash</Button>
        </div>
      </div>
    </AppShell>
  );
}

          action={<Button variant="primary" onClick={() => s.setRoute('discipline')}>Intizom bahosi sahifasiga o'tish</Button>}
        />
      </Card>
    </AppShell>
  );
}

// =========================================
// PAGE: Mentor Feedback
// =========================================
function PageMentorFeedback() {
  const s = useStore();
  const { students } = useMentorScope();
  const [studentId, setStudentId] = React.useState(students[0]?.id);
  const [score, setScore] = React.useState(0);
  const [text, setText]   = React.useState('');
  const [q, setQ] = React.useState('');

  const selected = students.find(x => x.id === parseInt(studentId)) || students[0];
  const history = s.feedbacks.filter(f => f.studentId === selected?.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  const filteredList = students.filter(x => x.name.toLowerCase().includes(q.toLowerCase()));

  const submit = () => {
    if (!selected) return;
    if (!score) { s.toast({ kind: 'error', title: 'Bahoni tanlang (1-5)' }); return; }
    if (text.trim().length < 10) { s.toast({ kind: 'error', title: 'Izoh kamida 10 ta belgi bo‘lishi kerak' }); return; }
    s.addFeedback({
      studentId: selected.id,
      mentorId: ME_MENTOR.id,
      score,
      text: text.trim(),
      date: '2026-05-15',
    });
    s.toast({ kind: 'success', title: 'Feedback yuborildi', description: `${selected.name} ga ${score}/5` });
    setScore(0); setText('');
  };

  return (
    <AppShell breadcrumb={['Mentor', 'Feedback yozish']}>
      <PageTitle title="Feedback yozish" desc="Talaba bo‘yicha qisqacha baho — admin va talabaning o‘zi ko‘radi" />

      <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 14 }}>
        {/* Student list */}
        <Card padding={0} style={{ alignSelf: 'flex-start' }}>
          <div style={{ padding: '12px 14px', borderBottom: `1px solid ${T.border}` }}>
            <Input value={q} onChange={e => setQ(e.target.value)} placeholder="Talaba qidirish..." size="sm" icon={<Icons.search size={13} />} />
          </div>
          <div style={{ maxHeight: 540, overflow: 'auto' }}>
            {filteredList.map(stu => {
              const isActive = stu.id === selected?.id;
              return (
                <div key={stu.id} onClick={() => setStudentId(stu.id)} style={{
                  padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10,
                  borderBottom: `1px solid ${T.border}`, cursor: 'pointer',
                  background: isActive ? T.bgSubtle : 'transparent',
                  borderLeft: isActive ? `3px solid ${T.slate900}` : '3px solid transparent',
                  paddingLeft: isActive ? 11 : 14,
                }}>
                  <Avatar name={stu.name} color={stu.avatarColor} size={28} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{stu.name}</div>
                    <div style={{ fontSize: 11, color: T.textMuted }}>{stu.group}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>

        {/* Composer + history */}
        <div>
          {selected && (
            <Card padding={20} style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${T.border}` }}>
                <Avatar name={selected.name} color={selected.avatarColor} size={42} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 600 }}>{selected.name}</div>
                  <div style={{ fontSize: 12, color: T.textMuted }}>{selected.group} · GPA {selected.gpa}% · Ball {selected.score}</div>
                </div>
                <Badge status={selected.status} />
              </div>

              <Field label="Baho">
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <Stars value={score} interactive onChange={setScore} size={22} />
                  <span style={{ fontSize: 13.5, color: T.textMuted, fontWeight: 500 }}>{score ? `${score} / 5` : 'Hali baholanmagan'}</span>
                </div>
              </Field>

              <Field label="Izoh" hint={`${text.length} / 500`}>
                <Textarea rows={5} value={text} onChange={e => setText(e.target.value.slice(0, 500))} placeholder="Talabaning bu davrdagi faolligi, kuchli va zaif tomonlari, takomillashtirish bo‘yicha tavsiya..." />
              </Field>

              <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 4 }}>
                <Button variant="outline" onClick={() => { setScore(0); setText(''); }}>Tozalash</Button>
                <Button variant="primary" onClick={submit} icon={<Icons.send size={13} />}>Yuborish</Button>
              </div>
            </Card>
          )}

          <Card padding={0}>
            <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.border}` }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{selected?.name} uchun feedback tarixi</div>
              <div style={{ fontSize: 12, color: T.textMuted, marginTop: 1 }}>{history.length} ta yozuv</div>
            </div>
            {history.length === 0 ? <Empty icon={Icons.message} title="Hali feedback yozilmagan" desc="Yuqoridagi forma orqali birinchi feedback'ni yozing" /> : (
              <div>
                {history.map((f, i) => (
                  <div key={f.id} style={{ padding: '14px 18px', borderBottom: i < history.length - 1 ? `1px solid ${T.border}` : 'none' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                      <Stars value={f.score} size={13} />
                      <span style={{ fontSize: 11.5, color: T.textMuted }}>{fmtDate(f.date)} · {fmtRelative(f.date)}</span>
                    </div>
                    <p style={{ margin: 0, fontSize: 13.5, lineHeight: 1.6, color: T.text }}>{f.text}</p>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      </div>
    </AppShell>
  );
}

Object.assign(window, { PageMentorDashboard, PageMentorStudents, PageMentorAttendance, PageMentorFeedback, PageMentorDiscipline });

</script>

// PAGE: Admin Students
// =========================================
function PageAdminStudents() {
  const s = useStore();
  const [q, setQ] = React.useState('');
  const [group, setGroup] = React.useState('all');
  const [status, setStatus] = React.useState('all');
  const [gpaMin, setGpaMin] = React.useState(0);
  const [selected, setSelected] = React.useState({});
  const [openId, setOpenId] = React.useState(null);

  const filtered = s.students.filter(x =>
    x.name.toLowerCase().includes(q.toLowerCase()) &&
    (group === 'all' || x.group === group) &&
    (status === 'all' || x.status === status) &&
    x.gpa >= gpaMin
  );

  const toggle = (id) => setSelected(sel => ({ ...sel, [id]: !sel[id] }));
  const toggleAll = () => {
    const allOn = filtered.every(x => selected[x.id]);
    const next = {};
    if (!allOn) filtered.forEach(x => next[x.id] = true);
    setSelected(next);
  };
  const selectedCount = Object.values(selected).filter(Boolean).length;
  const selectedIds = Object.entries(selected).filter(([_, v]) => v).map(([k]) => parseInt(k));

  const bulkGrant = () => {
    selectedIds.forEach(id => s.grant(id));
    s.toast({ kind: 'success', title: `${selectedCount} ta talabaga grant berildi` });
    setSelected({});
  };

  return (
    <AppShell breadcrumb={['Admin', 'Talabalar']}>
      <PageTitle title="Barcha talabalar" desc={`${s.students.length} ta talaba · Filter bo‘yicha ${filtered.length} ta`} actions={
        <>
          <Button variant="outline" size="sm" icon={<Icons.download size={13} />}>CSV</Button>
          <Button variant="primary" size="sm" icon={<Icons.plus size={13} />} onClick={() => s.toast('Talaba qo‘shish formasi')}>Talaba qo'shish</Button>
        </>
      } />

      {/* Filter panel */}
      <Card padding={14} style={{ marginBottom: 12 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1.4fr', gap: 10, alignItems: 'center' }}>
          <Input value={q} onChange={e => setQ(e.target.value)} placeholder="Ism yoki email..." icon={<Icons.search size={14} />} />
          <Select value={group} onChange={setGroup} options={[{value:'all',label:'Barcha guruhlar'}, ...GROUPS.map(g => ({value:g,label:g}))]} />
          <Select value={status} onChange={setStatus} options={[
            {value:'all', label:'Barcha statuslar'},
            {value:'GRANTED', label:'Grant berildi'},
            {value:'PENDING', label:'Kutilmoqda'},
            {value:'NOT_GRANTED', label:'Grant yo‘q'},
          ]} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12.5, color: T.textMuted }}>
            <span style={{ whiteSpace: 'nowrap' }}>GPA ≥</span>
            <input type="range" min={0} max={100} value={gpaMin} onChange={e => setGpaMin(parseInt(e.target.value))} style={{ flex: 1, accentColor: T.slate900 }} />
            <span style={{ fontWeight: 600, color: T.text, fontVariantNumeric: 'tabular-nums', minWidth: 38, textAlign: 'right' }}>{gpaMin}%</span>
          </div>
        </div>
      </Card>

      {/* Bulk action bar */}
      {selectedCount > 0 && (
        <div style={{
          padding: '10px 14px', marginBottom: 8, background: T.slate900, color: '#fff',
          borderRadius: 10, display: 'flex', alignItems: 'center', gap: 12,
          animation: 'em-slide-up .2s ease-out',
        }}>
          <span style={{ fontSize: 13 }}><strong>{selectedCount}</strong> talaba tanlandi</span>
          <Button size="sm" variant="success" onClick={bulkGrant} icon={<Icons.trophy size={13} />}>Grant berish</Button>
          <Button size="sm" variant="outline" onClick={() => s.toast('Eksport boshlandi')} icon={<Icons.download size={13} />} style={{ background: 'transparent', color: '#fff', borderColor: 'rgba(255,255,255,.25)' }}>Eksport</Button>
          <Button size="sm" variant="ghost" onClick={() => setSelected({})} style={{ marginLeft: 'auto', color: '#fff' }}>Tozalash</Button>
        </div>
      )}

      <Card padding={0}>
        {filtered.length === 0 ? <Empty icon={Icons.search} title="Hech narsa topilmadi" desc="Filtr parametrlarini o'zgartiring" /> : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: T.bg, borderBottom: `1px solid ${T.border}` }}>
                <th style={{ width: 40, padding: '11px 12px' }}>
                  <input type="checkbox" checked={filtered.length > 0 && filtered.every(x => selected[x.id])} onChange={toggleAll}
                    style={{ width: 14, height: 14, cursor: 'pointer', accentColor: T.slate900 }} />
                </th>
                {['Talaba', 'Guruh', 'Mentor', 'GPA', 'Davomat', 'Ball', 'Status'].map((h, i) => (
                  <th key={i} style={{
                    textAlign: i >= 3 && i <= 5 ? 'right' : 'left',
                    padding: '11px 16px', fontSize: 11.5, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em',
                  }}>{h}</th>
                ))}
                <th style={{ width: 40 }} />
              </tr>
            </thead>
            <tbody>
              {filtered.map((stu, i) => (
                <tr key={stu.id} style={{ borderBottom: i < filtered.length - 1 ? `1px solid ${T.border}` : 'none', background: selected[stu.id] ? T.bg : 'transparent' }}>
                  <td style={{ padding: '11px 12px' }}>
                    <input type="checkbox" checked={!!selected[stu.id]} onChange={() => toggle(stu.id)}
                      style={{ width: 14, height: 14, cursor: 'pointer', accentColor: T.slate900 }} />
                  </td>
                  <td style={{ padding: '11px 16px', cursor: 'pointer' }} onClick={() => setOpenId(stu.id)}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <Avatar name={stu.name} color={stu.avatarColor} size={30} />
                      <div>
                        <div style={{ fontWeight: 500 }}>{stu.name}</div>
                        <div style={{ fontSize: 11.5, color: T.textMuted }}>{stu.email}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{ padding: '11px 16px', color: T.textMuted }}>{stu.group}</td>
                  <td style={{ padding: '11px 16px', color: T.textMuted }}>{stu.mentor}</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: stu.gpa < 80 ? T.redDeep : T.text }}>{stu.gpa}%</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{stu.attendance}%</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right', fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{stu.score}</td>
                  <td style={{ padding: '11px 16px' }}><Badge status={stu.status} /></td>
                  <td style={{ padding: '11px 16px' }}>
                    <DropdownMenu
                      trigger={<button style={{ width: 26, height: 26, border: 0, background: 'transparent', color: T.textMuted, cursor: 'pointer', borderRadius: 6, display: 'grid', placeItems: 'center' }}><Icons.moreV size={14} /></button>}
                      items={[
                        { label: 'Batafsil',     icon: <Icons.eye size={13} />,   onClick: () => setOpenId(stu.id) },
                        { label: 'Grant berish',  icon: <Icons.trophy size={13}/>, onClick: () => { s.grant(stu.id); s.toast({ kind: 'success', title: `${stu.name} ga grant berildi`}); } },
                        { label: 'Jarima belgilash', icon: <Icons.shield size={13}/>, onClick: () => { s.setRoute('penalties'); } },
                        { separator: true },
                        { label: 'O‘chirish', icon: <Icons.trash size={13}/>, danger: true, onClick: () => s.toast({ kind: 'warning', title: 'Talabani o‘chirib bo‘lmaydi (demo)' }) },
                      ]}
                    />
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>

      <Sheet open={!!openId} onClose={() => setOpenId(null)} width={520}
        title={s.students.find(x => x.id === openId)?.name}
        description={openId ? s.students.find(x => x.id === openId)?.email : ''}
        footer={openId ? <>
          <Button variant="dangerO" onClick={() => { s.setStudentStatus(openId, 'NOT_GRANTED'); s.toast({ kind: 'warning', title: 'Status o‘zgartirildi' }); }}>Grant rad etish</Button>
          <Button variant="primary" onClick={() => { s.grant(openId); s.toast({ kind: 'success', title: 'Grant berildi' }); setOpenId(null); }} icon={<Icons.trophy size={13} />}>Grant berish</Button>
        </> : null}
      >
        {openId && <StudentSheetContent stu={s.students.find(x => x.id === openId)} />}
      </Sheet>
    </AppShell>
  );
}

// =========================================
// PAGE: Admin Achievements
// =========================================
function PageAdminAchievements() {
  const s = useStore();
  const [tab, setTab] = React.useState('PENDING');
  const [editPts, setEditPts] = React.useState({});
  const [rejectDialog, setRejectDialog] = React.useState(null);
  const [rejectReason, setRejectReason] = React.useState('');

  const list = s.achievements.filter(a => a.status === tab).sort((a, b) => new Date(b.date) - new Date(a.date));
  const tally = {
    PENDING:  s.achievements.filter(a => a.status === 'PENDING').length,
    APPROVED: s.achievements.filter(a => a.status === 'APPROVED').length,
    REJECTED: s.achievements.filter(a => a.status === 'REJECTED').length,
  };

  const approve = (a) => {
    const pts = parseInt(editPts[a.id] ?? a.points ?? 0);
    if (!pts || pts < 1) { s.toast({ kind: 'error', title: 'Ballni kiriting' }); return; }
    s.approveAchievement(a.id, pts);
    s.toast({ kind: 'success', title: 'Yutuq tasdiqlandi', description: `${a.title} · +${pts} ball` });
  };
  const submitReject = () => {
    if (!rejectReason.trim()) { s.toast({ kind: 'error', title: 'Sababni kiriting' }); return; }
    s.rejectAchievement(rejectDialog.id, rejectReason);
    s.toast({ kind: 'warning', title: 'Yutuq rad etildi' });
    setRejectDialog(null); setRejectReason('');
  };

  return (
    <AppShell breadcrumb={['Admin', 'Yutuqlar']}>
      <PageTitle title="Yutuqlarni tasdiqlash" desc="Talabalar tomonidan kiritilgan sertifikat, hakaton, ish va boshqa yutuqlar" />

      <Card padding={0}>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.border}` }}>
          <Tabs value={tab} onChange={setTab} items={[
            { id: 'PENDING',  label: 'Kutilmoqda',   count: tally.PENDING },
            { id: 'APPROVED', label: 'Tasdiqlangan', count: tally.APPROVED },
            { id: 'REJECTED', label: 'Rad etilgan',  count: tally.REJECTED },
          ]} />
        </div>

        {list.length === 0 ? <Empty icon={Icons.award} title="Bu bo'limda yutuq yo'q" /> : (
          <div style={{ padding: 14, display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
            {list.map(a => {
              const stu = s.students.find(x => x.id === a.studentId);
              const Ico = Icons[TYPE_ICON_KEY[a.type]] || Icons.star;
              return (
                <Card key={a.id} padding={16}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 12 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 8, background: T.bg, border: `1px solid ${T.border}`, display: 'grid', placeItems: 'center', flexShrink: 0 }}>
                      <Ico size={16} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{a.title}</div>
                      <div style={{ fontSize: 11.5, color: T.textMuted, marginTop: 2, display: 'flex', gap: 10, alignItems: 'center' }}>
                        <span>{TYPE_LABEL[a.type]}</span>
                        <span style={{ color: T.textSubtle }}>·</span>
                        <span>{fmtDate(a.date)}</span>
                      </div>
                    </div>
                    <Badge status={a.status} size="sm" />
                  </div>

                  {/* Student */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingBottom: 10, marginBottom: 10, borderBottom: `1px solid ${T.border}`, fontSize: 12.5 }}>
                    <Avatar name={stu?.name} color={stu?.avatarColor} size={22} />
                    <span style={{ fontWeight: 500 }}>{stu?.name}</span>
                    <span style={{ color: T.textMuted }}>·</span>
                    <span style={{ color: T.textMuted }}>{stu?.group}</span>
                  </div>

                  {a.desc && <p style={{ margin: '0 0 10px', fontSize: 12.5, color: T.textMuted, lineHeight: 1.5 }}>{a.desc}</p>}

                  {/* File preview */}
                  {a.file && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: 10, background: T.bg, borderRadius: 8, marginBottom: 12, border: `1px solid ${T.border}` }}>
                      <div style={{ width: 32, height: 32, borderRadius: 5, background: T.redBg, display: 'grid', placeItems: 'center', flexShrink: 0 }}>
                        <Icons.fileText size={14} stroke={T.red} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0, fontSize: 12 }}>
                        <div style={{ fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{a.file}</div>
                        <div style={{ color: T.textMuted, fontSize: 11 }}>PDF · 1.2 MB</div>
                      </div>
                      <Button size="sm" variant="ghost" icon={<Icons.eye size={13} />} onClick={() => s.toast('Hujjat preview')}>Ko‘rish</Button>
                    </div>
                  )}

                  {a.status === 'REJECTED' && a.reject && (
                    <div style={{ padding: '8px 10px', background: T.redBg, borderRadius: 6, fontSize: 12, color: T.redText, marginBottom: 10, display: 'flex', gap: 6 }}>
                      <Icons.alert size={13} stroke={T.red} style={{ marginTop: 2 }} />
                      <div><strong>Sabab:</strong> {a.reject}</div>
                    </div>
                  )}

                  {/* Action row */}
                  {a.status === 'PENDING' ? (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span style={{ fontSize: 12, color: T.textMuted, whiteSpace: 'nowrap' }}>Ball:</span>
                        <Input size="sm" type="number" value={editPts[a.id] ?? ''} placeholder="0–15"
                          onChange={e => setEditPts(p => ({ ...p, [a.id]: e.target.value }))} fullWidth={false} style={{ width: 70 }} />
                      </div>
                      <Button size="sm" variant="dangerO" icon={<Icons.x size={13} />} onClick={() => { setRejectDialog(a); setRejectReason(''); }}>Rad etish</Button>
                      <Button size="sm" variant="success" icon={<Icons.check size={13} />} onClick={() => approve(a)}>Tasdiqlash</Button>
                    </div>
                  ) : (
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12.5, color: T.textMuted }}>
                      <span>{a.status === 'APPROVED' ? <span style={{ color: T.emeraldDeep, fontWeight: 600 }}>+{a.points} ball qo‘shildi</span> : 'Rad etildi'}</span>
                      <Button size="sm" variant="ghost">Qaytadan ko'rib chiqish</Button>
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        )}
      </Card>

      <Dialog open={!!rejectDialog} onClose={() => setRejectDialog(null)}
        title="Yutuqni rad etish"
        description={rejectDialog ? `"${rejectDialog.title}" — sababni kiriting, talaba ko‘radi.` : ''}
        footer={<>
          <Button variant="outline" onClick={() => setRejectDialog(null)}>Bekor qilish</Button>
          <Button variant="danger" onClick={submitReject} icon={<Icons.x size={13} />}>Rad etish</Button>
        </>}>
        <Field label="Rad etish sababi">
          <Textarea rows={4} value={rejectReason} onChange={e => setRejectReason(e.target.value)} placeholder="Masalan: Sertifikat oxirgi 6 oydan eski yoki tasdiqlovchi havola yo‘q" />
        </Field>
      </Dialog>
    </AppShell>
  );
}

// =========================================
// PAGE: Admin Penalties
// =========================================
function PageAdminPenalties() {
  const s = useStore();
  const [dialogOpen, setDialogOpen] = React.useState(false);
  const [form, setForm] = React.useState({ studentId: '', type: 'LIGHT', reason: '' });
  const [recDialog, setRecDialog] = React.useState(null);
  const [recTask, setRecTask] = React.useState('');

  const submitPenalty = () => {
    if (!form.studentId) { s.toast({ kind: 'error', title: 'Talabani tanlang' }); return; }
    if (!form.reason.trim()) { s.toast({ kind: 'error', title: 'Sababni kiriting' }); return; }
    const t = PENALTY_TYPES.find(p => p.id === form.type);
    s.addPenalty({
      studentId: parseInt(form.studentId),
      type: form.type,
      pts: t.pts,
      reason: form.reason,
      date: '2026-05-15',
      recoveryAssigned: false,
    });
    const stu = s.students.find(x => x.id === parseInt(form.studentId));
    s.toast({ kind: 'warning', title: 'Jarima belgilandi', description: `${stu?.name} · ${t.pts} ball` });
    setDialogOpen(false);
    setForm({ studentId: '', type: 'LIGHT', reason: '' });
  };

  const submitRecovery = () => {
    if (!recTask.trim()) { s.toast({ kind: 'error', title: 'Vazifani yozing' }); return; }
    s.assignRecovery(recDialog.id, recTask);
    s.toast({ kind: 'success', title: 'Reabilitatsiya tayinlandi' });
    setRecDialog(null); setRecTask('');
  };

  const completeRec = (id) => {
    s.completeRecovery(id);
    s.toast({ kind: 'success', title: 'Reabilitatsiya bajarildi · Recovery ball qo‘shildi' });
  };

  const sortedPenalties = [...s.penalties].sort((a, b) => new Date(b.date) - new Date(a.date));

  return (
    <AppShell breadcrumb={['Admin', 'Jarimalar']}>
      <PageTitle title="Jarima va reabilitatsiya" desc="Talabalar uchun jarima belgilash va recovery vazifalarini boshqarish" actions={
        <Button variant="primary" icon={<Icons.plus size={14} />} onClick={() => setDialogOpen(true)}>Yangi jarima</Button>
      } />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 14 }}>
        <KpiCard label="Jami jarimalar"    value={s.penalties.length} icon={<Icons.shield size={14} />} />
        <KpiCard label="Faol (recovery yo'q)" value={s.penalties.filter(p => !p.recoveryAssigned).length} accent={T.redDeep} icon={<Icons.alert size={14} />} />
        <KpiCard label="Recovery'da"        value={s.penalties.filter(p => p.recoveryAssigned && !p.recoveryDone).length} accent={T.amberDeep} icon={<Icons.clock size={14} />} />
        <KpiCard label="Yopilgan"            value={s.penalties.filter(p => p.recoveryDone).length} accent={T.emeraldDeep} icon={<Icons.check size={14} />} />
      </div>

      <Card padding={0}>
        {sortedPenalties.length === 0 ? <Empty icon={Icons.shield} title="Hozircha jarima yo'q" /> : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: T.bg, borderBottom: `1px solid ${T.border}` }}>
                {['Talaba', 'Tur', 'Ball', 'Sabab', 'Sana', 'Recovery', ''].map((h, i) => (
                  <th key={i} style={{
                    textAlign: ['Ball'].includes(h) ? 'right' : 'left',
                    padding: '11px 16px', fontSize: 11.5, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em',
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sortedPenalties.map((p, i) => {
                const stu = s.students.find(x => x.id === p.studentId);
                const ptype = PENALTY_TYPES.find(t => t.id === p.type);
                return (
                  <tr key={p.id} style={{ borderBottom: i < sortedPenalties.length - 1 ? `1px solid ${T.border}` : 'none' }}>
                    <td style={{ padding: '11px 16px' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <Avatar name={stu?.name} color={stu?.avatarColor} size={28} />
                        <div>
                          <div style={{ fontWeight: 500, fontSize: 13 }}>{stu?.name}</div>
                          <div style={{ fontSize: 11.5, color: T.textMuted }}>{stu?.group}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: '11px 16px' }}>
                      <Badge variant={p.type === 'LIGHT' ? 'amber' : 'red'} size="sm">{ptype?.label}</Badge>
                    </td>
                    <td style={{ padding: '11px 16px', textAlign: 'right', fontWeight: 600, color: T.redDeep, fontVariantNumeric: 'tabular-nums' }}>{p.pts}</td>
                    <td style={{ padding: '11px 16px', color: T.textMuted, fontSize: 12.5, maxWidth: 260 }}>{p.reason}</td>
                    <td style={{ padding: '11px 16px', color: T.textMuted, fontSize: 12.5, whiteSpace: 'nowrap' }}>{fmtDate(p.date)}</td>
                    <td style={{ padding: '11px 16px' }}>
                      {p.recoveryDone ? <Badge variant="emerald" size="sm">Bajarildi</Badge> :
                       p.recoveryAssigned ? <Tooltip content={p.recoveryTask}><Badge variant="amber" size="sm">Topshirildi</Badge></Tooltip> :
                       <Badge variant="muted" size="sm">Tayinlanmagan</Badge>}
                    </td>
                    <td style={{ padding: '11px 16px', textAlign: 'right' }}>
                      {!p.recoveryAssigned && <Button size="sm" variant="outline" onClick={() => { setRecDialog(p); setRecTask(''); }}>Reabilitatsiya</Button>}
                      {p.recoveryAssigned && !p.recoveryDone && <Button size="sm" variant="success" onClick={() => completeRec(p.id)} icon={<Icons.check size={12} />}>Yopish</Button>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>

      {/* New penalty dialog */}
      <Dialog open={dialogOpen} onClose={() => setDialogOpen(false)} title="Yangi jarima" description="Talaba uchun jarima belgilash" size="md"
        footer={<><Button variant="outline" onClick={() => setDialogOpen(false)}>Bekor qilish</Button>
        <Button variant="danger" onClick={submitPenalty} icon={<Icons.shield size={13} />}>Jarima belgilash</Button></>}>
        <Field label="Talaba">
          <Select value={form.studentId} onChange={(v) => setForm(f => ({ ...f, studentId: v }))} placeholder="Talaba tanlang"
            options={s.students.map(x => ({ value: x.id, label: `${x.name} · ${x.group}` }))} />
        </Field>
        <Field label="Jarima turi">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {PENALTY_TYPES.map(t => (
              <button key={t.id} onClick={() => setForm(f => ({ ...f, type: t.id }))} style={{
                padding: 12, border: `1.5px solid ${form.type === t.id ? T.slate900 : T.border}`,
                background: form.type === t.id ? T.bg : T.white,
                borderRadius: 8, cursor: 'pointer', textAlign: 'left',
                display: 'flex', flexDirection: 'column', gap: 3,
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{t.label}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: T.redDeep, fontVariantNumeric: 'tabular-nums' }}>{t.pts}</span>
                </div>
                <span style={{ fontSize: 11.5, color: T.textMuted }}>{t.desc}</span>
              </button>
            ))}
          </div>
        </Field>
        <Field label="Sabab">
          <Textarea rows={3} value={form.reason} onChange={e => setForm(f => ({ ...f, reason: e.target.value }))} placeholder="Aniq holatni yozing — talaba ko‘radi" />
        </Field>
      </Dialog>

      {/* Recovery dialog */}
      <Dialog open={!!recDialog} onClose={() => setRecDialog(null)} title="Reabilitatsiya vazifasi"
        description={recDialog ? `Jarima: ${recDialog.reason}` : ''}
        footer={<><Button variant="outline" onClick={() => setRecDialog(null)}>Bekor qilish</Button>
        <Button variant="primary" onClick={submitRecovery} icon={<Icons.refresh size={13} />}>Tayinlash</Button></>}>
        <Field label="Vazifa matni" hint="Bajargandan keyin recovery ball qo'shiladi">
          <Textarea rows={4} value={recTask} onChange={e => setRecTask(e.target.value)} placeholder="Masalan: Davomatni 90% gacha ko‘tarish (2 hafta), barcha qarzlarni topshirish" />
        </Field>
      </Dialog>
    </AppShell>
  );
}

// =========================================
// PAGE: Admin Grants — new flow from Reyting
// Table with Grant ber / Rad et per row.
// Reads selected student IDs from store.selectedForGrant (set by Reyting).
// =========================================
function PageAdminGrants() {
  const s = useStore();
  const slots = 12;

  const [filter, setFilter] = React.useState('selected'); // 'selected' | 'all'
  const [confirmFinal, setConfirmFinal] = React.useState(false);
  const [rejectDialog, setRejectDialog] = React.useState(null);
  const [rejectReason, setRejectReason] = React.useState('LOW_SCORE');

  const selectedIds = s.selectedForGrant || [];
  const hasSelection = selectedIds.length > 0;

  // Default to "all" view when there's no selection so the page isn't empty.
  React.useEffect(() => {
    if (!hasSelection && filter === 'selected') setFilter('all');
  }, [hasSelection]);

  // Working set of students
  const allCandidates = React.useMemo(() => {
    if (filter === 'selected' && hasSelection) {
      const set = new Set(selectedIds);
      return s.students.filter(x => set.has(x.id));
    }
    // 'all' mode — show PENDING + recently changed (GRANTED/NOT_GRANTED also visible so admin can undo)
    return s.students.filter(x => x.status === 'PENDING' || x.status === 'GRANTED' || x.status === 'NOT_GRANTED');
  }, [filter, hasSelection, selectedIds.join(','), s.students]);

  const sorted = [...allCandidates].sort((a, b) =>
    ((b.breakdown && b.breakdown.finalScore) || b.score) - ((a.breakdown && a.breakdown.finalScore) || a.score)
  );

  // Stats over the working set
  const stats = {
    selected: selectedIds.length,
    granted:  sorted.filter(x => x.status === 'GRANTED').length,
    rejected: sorted.filter(x => x.status === 'NOT_GRANTED').length,
    pending:  sorted.filter(x => x.status === 'PENDING').length,
  };

  // Global slot info (across all students in the system)
  const totalGranted = s.students.filter(x => x.status === 'GRANTED').length;
  const slotsLeft = Math.max(0, slots - totalGranted);

  const grant = (stu) => {
    if (slotsLeft <= 0) {
      s.toast({ kind: 'warning', title: 'Slot to‘ldi', description: `Hammasi: ${slots}/${slots}` });
      return;
    }
    s.grant(stu.id);
    s.toast({ kind: 'success', title: `${stu.name} ga grant berildi` });
  };

  const reject = (stu) => {
    s.setStudentStatus(stu.id, 'NOT_GRANTED');
    // Mutate grantReason locally — store doesn't expose a setter for it,
    // but mutating in-place is fine here since we don't depend on equality.
    const target = s.students.find(x => x.id === stu.id);
    if (target) target.grantReason = rejectReason;
    s.toast({ kind: 'warning', title: `${stu.name} rad etildi`, description: GRANT_REASON_LABEL[rejectReason] });
    setRejectDialog(null);
    setRejectReason('LOW_SCORE');
  };

  const undo = (stu) => {
    s.setStudentStatus(stu.id, 'PENDING');
    const target = s.students.find(x => x.id === stu.id);
    if (target) target.grantReason = 'PENDING';
    s.toast({ kind: 'default', title: `${stu.name} — qayta ko'rib chiqilmoqda` });
  };

  return (
    <AppShell breadcrumb={['Admin', 'Grant qarori']}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 18 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 600, margin: 0, letterSpacing: '-0.02em' }}>Grant qarori</h1>
          <p style={{ margin: '4px 0 0', color: T.textMuted, fontSize: 13.5 }}>
            <span style={{ fontWeight: 500, color: T.text }}>{sorted.length}</span> ta nomzod talaba ·
            <span style={{ marginLeft: 6 }}>slot </span>
            <span style={{ color: T.emeraldDeep, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{totalGranted}</span>
            <span style={{ color: T.textMuted }}>/</span>
            <span style={{ fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{slots}</span>
          </p>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <Button variant="ghost" size="sm" icon={<Icons.arrowLeft size={13} />} onClick={() => s.setRoute('rating')}>
            Reyting'ga qaytish
          </Button>
          <Button variant="primary" size="sm" onClick={() => setConfirmFinal(true)} icon={<Icons.check size={14} />}>
            Qarorni yakunlash
          </Button>
        </div>
      </div>

      {/* Stats row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 14 }}>
        <StatTile label="Tanlangan"      value={selectedIds.length}    accent={T.text}        icon={<Icons.check size={14} />} />
        <StatTile label="Grant berildi"  value={stats.granted}         accent={T.emeraldDeep} icon={<Icons.trophy size={14} stroke={T.emerald} />} bg={T.emeraldBg} />
        <StatTile label="Rad etildi"     value={stats.rejected}        accent={T.redDeep}     icon={<Icons.xCircle size={14} stroke={T.red} />}    bg={T.redBg} />
        <StatTile label="Kutilmoqda"      value={stats.pending}         accent={T.amberDeep}   icon={<Icons.clock size={14} stroke={T.amber} />}    bg={T.amberBg} />
      </div>

      {/* Filter + slot indicator */}
      <Card padding={12} style={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
          {hasSelection && (
            <Tabs value={filter} onChange={setFilter} items={[
              { id: 'selected', label: 'Tanlanganlar',    count: selectedIds.length },
              { id: 'all',      label: 'Barcha nomzodlar' },
            ]} />
          )}
          {!hasSelection && (
            <div style={{ fontSize: 12.5, color: T.textMuted, display: 'flex', alignItems: 'center', gap: 6 }}>
              <Icons.info size={13} />
              Hech kim tanlanmagan. <a href="#" onClick={(e) => { e.preventDefault(); s.setRoute('rating'); }} style={{ color: T.text, textDecoration: 'underline', textUnderlineOffset: 2 }}>Reyting</a> sahifasidan kandidatlarni belgilang.
            </div>
          )}
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 10, fontSize: 12.5 }}>
            <span style={{ color: T.textMuted }}>Slot</span>
            <div style={{ width: 140, height: 6, background: T.bgSubtle, borderRadius: 999, overflow: 'hidden' }}>
              <div style={{ width: `${(totalGranted / slots) * 100}%`, height: '100%', background: T.emerald, transition: 'width .3s' }} />
            </div>
            <span style={{ fontVariantNumeric: 'tabular-nums', fontWeight: 600 }}>
              <span style={{ color: T.emeraldDeep }}>{totalGranted}</span>
              <span style={{ color: T.textMuted, fontWeight: 400 }}> / {slots}</span>
            </span>
          </div>
        </div>
      </Card>

      {/* Table */}
      <Card padding={0}>
        {sorted.length === 0 ? (
          <Empty icon={Icons.trophy} title="Nomzodlar yo'q"
            desc="Reyting sahifasiga qaytib kandidatlarni tanlang yoki 'Barcha nomzodlar' rejimiga o'ting"
            action={<Button variant="primary" onClick={() => s.setRoute('rating')} icon={<Icons.arrowLeft size={13} />}>Reyting'ga qaytish</Button>}
          />
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: T.bg, borderBottom: `1px solid ${T.border}` }}>
                {[
                  { l: '#', a: 'center', w: 56 },
                  { l: 'Talaba', a: 'left' },
                  { l: 'Guruh', a: 'left', w: 110 },
                  { l: 'GPA', a: 'right', w: 70 },
                  { l: 'Ball', a: 'right', w: 80 },
                  { l: 'Status', a: 'left', w: 190 },
                  { l: 'Amal', a: 'right', w: 220 },
                ].map((h, i) => (
                  <th key={i} style={{
                    textAlign: h.a, padding: '11px 16px', fontSize: 11.5, fontWeight: 600,
                    color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em', width: h.w,
                  }}>{h.l}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map((stu, i) => {
                const finalScore = (stu.breakdown && stu.breakdown.finalScore != null) ? stu.breakdown.finalScore : stu.score;
                const isPending  = stu.status === 'PENDING';
                const isGranted  = stu.status === 'GRANTED';
                const isRejected = stu.status === 'NOT_GRANTED';
                return (
                  <tr key={stu.id} style={{
                    borderBottom: i < sorted.length - 1 ? `1px solid ${T.border}` : 'none',
                    background: isGranted ? '#f0fdf4'
                              : isRejected ? '#fff1f2'
                              : 'transparent',
                  }}>
                    <td style={{ padding: '12px 16px', textAlign: 'center', color: T.textMuted, fontVariantNumeric: 'tabular-nums', fontWeight: 500 }}>{i + 1}</td>
                    <td style={{ padding: '12px 16px' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <Avatar name={stu.name} color={stu.avatarColor} size={30} />
                        <div>
                          <div style={{ fontWeight: 500 }}>{stu.name}</div>
                          <div style={{ fontSize: 11.5, color: T.textMuted }}>{stu.email}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: '12px 16px', color: T.textMuted }}>{stu.group}</td>
                    <td style={{ padding: '12px 16px', textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: stu.gpa < 75 ? T.redDeep : T.text, fontWeight: stu.gpa < 75 ? 600 : 400 }}>{stu.gpa}%</td>
                    <td style={{ padding: '12px 16px', textAlign: 'right', fontWeight: 700, fontVariantNumeric: 'tabular-nums', fontSize: 14 }}>{finalScore.toFixed(1)}</td>
                    <td style={{ padding: '12px 16px' }}>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                        <Badge status={stu.status} size="sm" />
                        <span style={{ fontSize: 11, color: T.textMuted, lineHeight: 1.3 }}>
                          {(window.GRANT_REASON_LABEL_SHORT || {})[stu.grantReason] || GRANT_REASON_LABEL[stu.grantReason] || ''}
                        </span>
                      </div>
                    </td>
                    <td style={{ padding: '12px 16px', textAlign: 'right' }}>
                      {isPending && (
                        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 6 }}>
                          <Button size="sm" variant="dangerO" onClick={() => setRejectDialog(stu)} icon={<Icons.x size={12} />}>Rad et</Button>
                          <Button size="sm" variant="success" onClick={() => grant(stu)} icon={<Icons.check size={12} />}>Grant ber</Button>
                        </div>
                      )}
                      {isGranted && (
                        <Button size="sm" variant="ghost" onClick={() => undo(stu)} icon={<Icons.refresh size={12} />}>Bekor qilish</Button>
                      )}
                      {isRejected && (
                        <Button size="sm" variant="ghost" onClick={() => undo(stu)} icon={<Icons.refresh size={12} />}>Qayta ko'rib chiqish</Button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>

      {/* Reject dialog with reason picker */}
      <Dialog open={!!rejectDialog} onClose={() => setRejectDialog(null)}
        title="Grant rad etish sababi"
        description={rejectDialog ? `${rejectDialog.name} ga grant berilmaydi. Sababni belgilang — talaba va mentor xabar oladi.` : ''}
        footer={<>
          <Button variant="outline" onClick={() => setRejectDialog(null)}>Bekor qilish</Button>
          <Button variant="danger" onClick={() => reject(rejectDialog)} icon={<Icons.x size={13} />}>Rad etish</Button>
        </>}
      >
        <Field label="Sabab">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {[
              { id: 'ACADEMIC_FAIL',   label: 'Akademik past', desc: 'GPA / akademik ko‘rsatkich past' },
              { id: 'LOW_SCORE',       label: 'Ball past',     desc: 'Umumiy ball minimal chegaradan past' },
              { id: 'PAYMENT_OVERDUE', label: 'To‘lov muddati', desc: 'Kontrakt to‘lovi muddatida emas' },
            ].map(opt => {
              const active = rejectReason === opt.id;
              return (
                <button key={opt.id} type="button" onClick={() => setRejectReason(opt.id)} style={{
                  padding: 12, textAlign: 'left',
                  border: `1.5px solid ${active ? T.slate900 : T.border}`,
                  background: active ? T.bg : T.white,
                  borderRadius: 8, cursor: 'pointer',
                  display: 'flex', flexDirection: 'column', gap: 4,
                }}>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{opt.label}</span>
                  <span style={{ fontSize: 11.5, color: T.textMuted }}>{opt.desc}</span>
                </button>
              );
            })}
          </div>
        </Field>
      </Dialog>

      {/* Finalize confirmation */}
      <Dialog open={confirmFinal} onClose={() => setConfirmFinal(false)} title="Qarorni yakunlash"
        description={`${totalGranted} ta talabaga grant berilishi tasdiqlanmoqda. Bu amaldan keyin barcha talabalar va mentorlarga xabar yuboriladi.`}
        footer={<>
          <Button variant="outline" onClick={() => setConfirmFinal(false)}>Bekor qilish</Button>
          <Button variant="primary" onClick={() => { setConfirmFinal(false); s.toast({ kind: 'success', title: 'Qaror yakunlandi', description: `${totalGranted} ta grant berildi · email yuborildi` }); }} icon={<Icons.check size={14} />}>Tasdiqlash</Button>
        </>}
      >
        <div style={{ padding: '8px 0', display: 'flex', gap: 18, fontSize: 13 }}>
          <div><div style={{ color: T.textMuted }}>Slot</div><div style={{ fontWeight: 600, fontSize: 18 }}>{slots}</div></div>
          <div><div style={{ color: T.textMuted }}>Berildi</div><div style={{ fontWeight: 600, fontSize: 18, color: T.emeraldDeep }}>{totalGranted}</div></div>
          <div><div style={{ color: T.textMuted }}>Bo‘sh</div><div style={{ fontWeight: 600, fontSize: 18 }}>{slots - totalGranted}</div></div>
          <div><div style={{ color: T.textMuted }}>Rad etilgan</div><div style={{ fontWeight: 600, fontSize: 18, color: T.redDeep }}>{s.students.filter(x => x.status === 'NOT_GRANTED').length}</div></div>
        </div>
      </Dialog>
    </AppShell>
  );
}

// =========================================
// PAGE: Admin Rating (Spreadsheet-style + selectable)
// =========================================
function PageAdminRating() {
  const s = useStore();
  const [q, setQ]             = React.useState('');
  const [group, setGroup]     = React.useState('all');
  const [course, setCourse]   = React.useState('all');
  const [statusF, setStatusF] = React.useState('all');
  const [riskF, setRiskF]     = React.useState('all');
  const [sortKey, setSortKey] = React.useState('finalScore');
  const [sortDir, setSortDir] = React.useState('desc');
  const [selected, setSelected] = React.useState({});

  // Derive list (handle case where existing students may not yet have breakdown)
  const list = s.students.filter(x =>
    (group === 'all' || x.group === group) &&
    (course === 'all' || (x.group && x.group.split('-')[1] === course)) &&
    (statusF === 'all' || x.grantReason === statusF) &&
    (riskF === 'all' || x.riskLevel === riskF) &&
    x.name.toLowerCase().includes(q.toLowerCase())
  );

  // Sort by chosen key (most are breakdown.* fields)
  const sorted = [...list].sort((a, b) => {
    const get = (x) => {
      if (sortKey === 'name')   return x.name;
      if (sortKey === 'group')  return x.group;
      if (x.breakdown && sortKey in x.breakdown) return x.breakdown[sortKey];
      return x[sortKey];
    };
    const va = get(a), vb = get(b);
    const cmp = typeof va === 'string' ? va.localeCompare(vb) : (va || 0) - (vb || 0);
    return sortDir === 'desc' ? -cmp : cmp;
  });

  const courses = Array.from(new Set(GROUPS.map(g => g.split('-')[1])));

  const exportCsv = () => {
    const headers = [
      '#', 'Ism', 'Guruh', 'Status',
      'Academic %', 'Academic ball', 'Attendance %', 'Attendance ball',
      'Assignment %', 'Assignment ball', 'Activity %', 'Activity ball',
      'Tyutor %', 'Tyutor ball', 'Discipline %', 'Discipline ball',
      'Total', 'Penalty', 'Recovery', 'Employment', 'Final Score',
      'Holat', 'Sabab', 'Risk',
    ];
    const rows = sorted.map((x, i) => {
      const b = x.breakdown || {};
      return [
        i + 1, x.name, x.group, (x.status === 'GRANTED' ? 'Grantda' : 'Kontraktda'),
        b.academicPct, b.academic, b.attendancePct, b.attendance,
        b.projectPct, b.projects, b.activityPct, b.activity,
        b.tutorPct, b.tutor, b.disciplinePct, b.discipline,
        b.total, b.penalty, b.recovery, b.employment, b.finalScore,
        STATUS_LABEL[x.status], GRANT_REASON_LABEL[x.grantReason] || '',
        RISK_LABEL[x.riskLevel] || '',
      ];
    });
    const csv = [headers, ...rows].map(r =>
      r.map(v => {
        const sv = String(v ?? '');
        return /[",\n]/.test(sv) ? `"${sv.replace(/"/g, '""')}"` : sv;
      }).join(',')
    ).join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `edumetric-rating-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    s.toast({ kind: 'success', title: 'CSV yuklab olindi', description: `${sorted.length} ta talaba ma‘lumoti` });
  };

  // Sortable header cell
  const setSort = (k) => {
    if (k === sortKey) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(k); setSortDir('desc'); }
  };

  // Quick select preset — grant candidates (PENDING + score>=80)
  const selectCandidates = () => {
    const next = {};
    sorted.forEach(x => {
      if (x.grantReason === 'PENDING' && ((x.breakdown && x.breakdown.finalScore != null ? x.breakdown.finalScore : x.score) >= 80)) {
        next[x.id] = true;
      }
    });
    setSelected(next);
  };

  const selectedCount = sorted.filter(x => selected[x.id]).length;
  const allSelected   = sorted.length > 0 && sorted.every(x => selected[x.id]);
  const someSelected  = selectedCount > 0 && !allSelected;
  const toggleOne = (id) => setSelected(p => ({ ...p, [id]: !p[id] }));
  const toggleAll = () => {
    if (allSelected) setSelected({});
    else {
      const next = {};
      sorted.forEach(x => { next[x.id] = true; });
      setSelected(next);
    }
  };
  const proceedToGrants = () => {
    const ids = sorted.filter(x => selected[x.id]).map(x => x.id);
    s.setSelectedForGrant(ids);
    s.setRoute('grants');
    s.toast({ kind: 'success', title: `${ids.length} ta nomzod tanlandi`, description: 'Grant qarori sahifasi ochildi' });
  };

  return (
    <AppShell breadcrumb={['Admin', 'Reyting']}>
      <PageTitle title="Talabalar reytingi"
        desc={`Grant nizomi 2026.1 asosida hisoblangan barcha mezonlar · ${sorted.length} ta talaba · checkbox bilan kandidatlarni tanlang`}
        actions={
          <>
            <Button variant="outline" size="sm" icon={<Icons.bolt size={13} />} onClick={selectCandidates}>
              Kandidatlarni tanlash
            </Button>
            <Button variant="outline" size="sm" icon={<Icons.download size={13} />} onClick={exportCsv}>
              CSV eksport
            </Button>
          </>
        }
      />

      {/* Filters */}
      <Card padding={12} style={{ marginBottom: 12 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 0.9fr 0.9fr 1fr 1fr', gap: 10, alignItems: 'center' }}>
          <Input value={q} onChange={e => setQ(e.target.value)} placeholder="Ism..." icon={<Icons.search size={14} />} size="sm" />
          <Select size="sm" value={group} onChange={setGroup}  options={[{value:'all',label:'Barcha guruhlar'}, ...GROUPS.map(g => ({value:g,label:g}))]} />
          <Select size="sm" value={course} onChange={setCourse} options={[{value:'all',label:'Barcha kurslar'}, ...courses.map(c => ({value:c,label:`Kurs ${c}`}))]} />
          <Select size="sm" value={statusF} onChange={setStatusF} options={[
            {value:'all',           label:'Barcha holat'},
            {value:'GRANTED_OK',    label:'Grant berildi'},
            {value:'PENDING',       label:'Kutilmoqda'},
            {value:'ACADEMIC_FAIL', label:'Akademik fail'},
            {value:'LOW_SCORE',     label:'Ball past'},
            {value:'PAYMENT_OVERDUE', label:'To‘lov qarz'},
          ]} />
          <Select size="sm" value={riskF} onChange={setRiskF} options={[
            {value:'all',    label:'Barcha risk'},
            {value:'LOW',    label:'Past (Low)'},
            {value:'MEDIUM', label:'O‘rta (Medium)'},
            {value:'HIGH',   label:'Yuqori (High)'},
          ]} />
        </div>
      </Card>

      {/* Color-code summary strip */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 10, fontSize: 11.5, color: T.textMuted, alignItems: 'center', flexWrap: 'wrap' }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 10, height: 10, background: T.emerald, borderRadius: 2 }} /> {sorted.filter(x => x.riskLevel === 'LOW').length} ta past xavf
        </span>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 10, height: 10, background: T.amber, borderRadius: 2 }} /> {sorted.filter(x => x.riskLevel === 'MEDIUM').length} ta o‘rta
        </span>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 10, height: 10, background: T.red, borderRadius: 2 }} /> {sorted.filter(x => x.riskLevel === 'HIGH').length} ta yuqori xavf
        </span>
        <span style={{ marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <Icons.info size={12} /> Ustun nomiga bosib tartiblang · gorizontal scroll faollashgan
        </span>
      </div>

      {/* Spreadsheet table */}
      <div style={{ paddingBottom: selectedCount > 0 ? 60 : 0 }}>
        <RatingSpreadsheet
          rows={sorted}
          sortKey={sortKey} sortDir={sortDir} setSort={setSort}
          selected={selected}
          toggleOne={toggleOne}
          allSelected={allSelected}
          someSelected={someSelected}
          toggleAll={toggleAll}
        />
      </div>

      {/* Bottom action bar */}
      {selectedCount > 0 && (
        <div style={{
          position: 'sticky', bottom: 18, marginTop: 14, zIndex: 30,
          background: T.slate900, color: '#fff',
          borderRadius: 12, padding: '12px 18px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
          boxShadow: '0 12px 32px rgba(15,23,42,.25)',
          animation: 'em-slide-up .25s cubic-bezier(.2,.7,.3,1)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 32, height: 32, borderRadius: 999, background: 'rgba(255,255,255,.12)', display: 'grid', placeItems: 'center' }}>
              <Icons.check size={16} />
            </div>
            <div>
              <div style={{ fontSize: 13.5, fontWeight: 600 }}><span style={{ fontVariantNumeric: 'tabular-nums' }}>{selectedCount}</span> ta talaba tanlandi</div>
              <div style={{ fontSize: 11.5, opacity: .65 }}>Grant qarori sahifasiga o'tib har biriga grant berish yoki rad etishingiz mumkin</div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Button variant="ghost" onClick={() => setSelected({})} style={{ color: '#fff', background: 'transparent' }}>Tozalash</Button>
            <Button variant="success" onClick={proceedToGrants} iconRight={<Icons.arrowRight size={14} />}>
              Grant berishga o'tish
            </Button>
          </div>
        </div>
      )}
    </AppShell>
  );
}

// --- Spreadsheet sub-component (with fullscreen mode) ---
function RatingSpreadsheet({ rows, sortKey, sortDir, setSort, selected, toggleOne, allSelected, someSelected, toggleAll }) {
  const [fullscreen, setFullscreen] = React.useState(false);
  React.useEffect(() => {
    if (!fullscreen) return;
    const onKey = (e) => { if (e.key === 'Escape') setFullscreen(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [fullscreen]);
  // Color a cell by % value (0..100 scale)
  const pctColor = (pct) => pct >= 85 ? T.emeraldDeep : pct >= 70 ? T.text : pct >= 55 ? T.amberDeep : T.redDeep;

  // SortHead — small sortable header
  const SH = ({ k, children, align = 'right', tone, width }) => {
    const active = sortKey === k;
    return (
      <th onClick={() => setSort(k)} style={{
        textAlign: align, padding: '4px 8px', fontSize: 10.5, fontWeight: 600,
        color: active ? T.text : T.textMuted, textTransform: 'none', letterSpacing: 0,
