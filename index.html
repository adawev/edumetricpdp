              <SH k="disciplinePct" tone={TONE_DI} width={50}>%</SH>
              <SH k="discipline"    tone={TONE_DI} width={56}>Ball</SH>
            </tr>
          </thead>
          <tbody>
            {rows.map((x, i) => {
              const b = x.breakdown || {};
              const risk = RISK_COLOR[x.riskLevel] || RISK_COLOR.MEDIUM;
              const isGrantHolder = x.status === 'GRANTED';
              const isSelected = !!(selected && selected[x.id]);
              const rowBg = isSelected ? '#fffbe6' : (i % 2 === 0 ? T.white : '#fbfcfd');
              return (
                <tr key={x.id} style={{
                  background: rowBg, transition: 'background .12s',
                }}>
                  <td style={_td({ width: 38, left: 0, position: 'sticky', background: rowBg, borderRight: `1px solid ${T.border}`, textAlign: 'center', padding: '6px 6px' })}>
                    <input type="checkbox" checked={isSelected} onChange={() => toggleOne && toggleOne(x.id)}
                      style={{ width: 14, height: 14, cursor: 'pointer', accentColor: T.slate900, verticalAlign: 'middle' }} />
                  </td>
                  <td style={_td({ width: 44, left: 38, position: 'sticky', background: rowBg, borderRight: `1px solid ${T.border}`, textAlign: 'center', color: T.textMuted, fontWeight: 600 })}>{i + 1}</td>
                  <td style={_td({ minWidth: 200, left: 82, position: 'sticky', background: rowBg, borderRight: `1px solid ${T.border}`, textAlign: 'left' })}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <Avatar name={x.name} color={x.avatarColor} size={24} />
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontWeight: 500, lineHeight: 1.2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 200 }}>{x.name}</div>
                        <div style={{ fontSize: 10.5, color: T.textMuted, lineHeight: 1.2 }}>{x.email}</div>
                      </div>
                    </div>
                  </td>
                  <td style={_td({ textAlign: 'left' })}>{x.group}</td>
                  <td style={_td({ textAlign: 'left' })}>
                    <Badge variant={isGrantHolder ? 'emerald' : 'muted'} size="sm">
                      {isGrantHolder ? 'Grantda' : 'Kontraktda'}
                    </Badge>
                  </td>
                  {/* Mezons */}
                  <td style={_td({ background: TONE_AC, color: pctColor(b.academicPct) })}>{b.academicPct}</td>
                  <td style={_td({ background: TONE_AC, fontWeight: 600 })}>{b.academic}</td>
                  <td style={_td({ background: TONE_AT, color: pctColor(b.attendancePct) })}>{b.attendancePct}</td>
                  <td style={_td({ background: TONE_AT, fontWeight: 600 })}>{b.attendance}</td>
                  <td style={_td({ background: TONE_AS, color: pctColor(b.projectPct) })}>{b.projectPct}</td>
                  <td style={_td({ background: TONE_AS, fontWeight: 600 })}>{b.projects}</td>
                  <td style={_td({ background: TONE_AV, color: pctColor(b.activityPct) })}>{b.activityPct}</td>
                  <td style={_td({ background: TONE_AV, fontWeight: 600 })}>{b.activity}</td>
                  <td style={_td({ background: TONE_TU, color: pctColor(b.tutorPct) })}>{b.tutorPct}</td>
                  <td style={_td({ background: TONE_TU, fontWeight: 600 })}>{b.tutor}</td>
                  <td style={_td({ background: TONE_DI, color: pctColor(b.disciplinePct) })}>{b.disciplinePct}</td>
                  <td style={_td({ background: TONE_DI, fontWeight: 600 })}>{b.discipline}</td>
                  <td style={_td({ background: TONE_TT, fontWeight: 700 })}>{b.total}</td>
                  <td style={_td({ background: TONE_BN, color: b.penalty < 0 ? T.redDeep : T.textSubtle, fontWeight: b.penalty < 0 ? 600 : 400 })}>{b.penalty || '—'}</td>
                  <td style={_td({ background: TONE_BN, color: b.recovery > 0 ? T.emeraldDeep : T.textSubtle, fontWeight: b.recovery > 0 ? 600 : 400 })}>{b.recovery ? `+${b.recovery}` : '—'}</td>
                  <td style={_td({ background: TONE_BN, color: b.employment > 0 ? T.emeraldDeep : T.textSubtle, fontWeight: b.employment > 0 ? 600 : 400 })}>{b.employment ? `+${b.employment}` : '—'}</td>
                  <td style={_td({ background: '#0f172a', color: '#fff', fontWeight: 700, fontSize: 13 })}>{b.finalScore}</td>
                  <td style={_td({ textAlign: 'left', padding: '6px 8px' })}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                      <Badge status={x.status} size="sm" />
                      <span style={{ fontSize: 10.5, color: T.textMuted, lineHeight: 1.3 }}>
                        {GRANT_REASON_LABEL[x.grantReason]}
                      </span>
                    </div>
                  </td>
                  <td style={{ padding: 0, borderBottom: `1px solid ${T.border}`, borderRight: `1px solid ${T.border}` }}>
                    <div style={{
                      background: risk.bg, color: risk.fg,
                      padding: '8px 10px', fontSize: 11.5, fontWeight: 600,
                      display: 'flex', alignItems: 'center', gap: 6,
                      height: '100%',
                      letterSpacing: '.02em',
                    }}>
                      {x.riskLevel === 'HIGH' && <Icons.alert size={12} />}
                      {x.riskLevel === 'MEDIUM' && <Icons.clock size={12} />}
                      {x.riskLevel === 'LOW' && <Icons.check size={12} />}
                      {RISK_LABEL[x.riskLevel]}
                    </div>
                  </td>
                </tr>
              );
            })}
            {rows.length === 0 && (
              <tr>
                <td colSpan={24} style={{ padding: 0 }}>
                  <Empty icon={Icons.search} title="Hech narsa topilmadi" desc="Filtrlarni o‘zgartiring" />
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
  );

  // Fullscreen overlay
  if (fullscreen) {
    return (
      <div style={{
        position: 'fixed', inset: 0, zIndex: 60, background: 'rgba(15,23,42,.5)',
        display: 'flex', flexDirection: 'column', padding: 16,
        animation: 'em-fade-in .15s ease-out',
      }}>
        <div style={{
          flex: 1, background: T.white, borderRadius: 12, overflow: 'hidden',
          display: 'flex', flexDirection: 'column', minHeight: 0,
          boxShadow: '0 24px 64px rgba(15,23,42,.35)',
          animation: 'em-pop-in .18s ease-out',
        }}>
          <div style={{
            padding: '12px 18px', borderBottom: `1px solid ${T.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
          }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 600 }}>Reyting spreadsheet</div>
              <div style={{ fontSize: 11.5, color: T.textMuted, marginTop: 2 }}>{rows.length} ta talaba · Esc bilan yopiladi</div>
            </div>
            <Button variant="outline" size="sm" icon={<Icons.x size={13} />} onClick={() => setFullscreen(false)}>Yopish</Button>
          </div>
          {tableContent}
        </div>
      </div>
    );
  }

  return (
    <div style={{
      border: `1px solid ${T.border}`, borderRadius: 10, overflow: 'hidden', background: T.white,
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{
        padding: '8px 14px', borderBottom: `1px solid ${T.border}`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10,
        background: T.bg, fontSize: 12, color: T.textMuted,
      }}>
        <span><Icons.info size={11} style={{ verticalAlign: 'middle', marginRight: 4 }} />Gorizontal scroll mavjud · ustun nomiga bosib tartiblang</span>
        <Button variant="outline" size="sm" icon={<Icons.panel size={13} />} onClick={() => setFullscreen(true)}>
          Kengaytirish
        </Button>
      </div>
      {tableContent}
    </div>
  );
}

// Shared th/td style helpers for spreadsheet
function _thBase(extra) {
  return {
    background: T.bg, padding: '6px 10px', fontSize: 10.5, fontWeight: 600,
    color: T.text, textAlign: 'right', whiteSpace: 'nowrap',
    borderRight: `1px solid ${T.border}`, borderBottom: `1px solid ${T.border}`,
    ...extra,
  };
}
function _thGroup(bg) {
  return {
    background: bg, padding: '4px 10px', fontSize: 11, fontWeight: 700,
    color: T.text, textAlign: 'center', whiteSpace: 'nowrap',
    borderRight: `1px solid ${T.border}`, borderBottom: `1px solid ${T.border}`,
    letterSpacing: '.01em',
  };
}
function _td(extra) {
  return {
    padding: '6px 8px', borderRight: `1px solid ${T.border}`, borderBottom: `1px solid ${T.border}`,
    textAlign: 'right', whiteSpace: 'nowrap', fontSize: 11.5,
    ...extra,
  };
}

// =========================================
// PAGE: Admin Integrations (API keys)
// =========================================
function PageAdminIntegrations() {
  const s = useStore();
  const [open, setOpen] = React.useState(false);
  const [name, setName] = React.useState('');
  const [newKey, setNewKey] = React.useState(null);

  const create = () => {
    if (!name.trim()) { s.toast({ kind: 'error', title: 'Nom kiriting' }); return; }
    const k = s.addApiKey(name);
    setNewKey(k);
    setName('');
  };
  const copy = (text) => {
    if (navigator.clipboard) navigator.clipboard.writeText(text);
    s.toast({ kind: 'success', title: 'Nusxalandi' });
  };

  return (
    <AppShell breadcrumb={['Admin', 'API kalitlar']}>
      <PageTitle title="API kalitlar" desc="EduMetric tashqi tizimlar bilan integratsiya uchun — HEMIS, mobil ilova va boshqalar" actions={
        <Button variant="primary" icon={<Icons.plus size={14} />} onClick={() => { setOpen(true); setNewKey(null); }}>Yangi kalit</Button>
      } />

      <Card padding={20} style={{ marginBottom: 14, background: T.slate900, color: '#fff', border: 'none' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div style={{ width: 44, height: 44, borderRadius: 10, background: 'rgba(255,255,255,.12)', display: 'grid', placeItems: 'center' }}>
            <Icons.fileText size={20} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>API hujjatlari</div>
            <div style={{ fontSize: 12.5, color: 'rgba(255,255,255,.6)', marginTop: 2 }}>Swagger UI · barcha endpointlar va misollar</div>
          </div>
          <Button variant="outline" size="sm" style={{ background: 'transparent', color: '#fff', borderColor: 'rgba(255,255,255,.25)' }} icon={<Icons.link size={13} />} onClick={() => s.toast('Swagger ochilmoqda')}>Hujjatlarga o'tish</Button>
        </div>

        <div style={{ marginTop: 16, padding: 14, background: 'rgba(0,0,0,.25)', borderRadius: 8, fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: 'rgba(255,255,255,.85)', lineHeight: 1.6 }}>
          <div><span style={{ color: '#10b981' }}>POST</span> /api/integrations/attendance</div>
          <div><span style={{ color: '#3b82f6' }}>GET</span>  /api/students/{`{id}`}/score</div>
          <div><span style={{ color: '#10b981' }}>POST</span> /api/achievements</div>
          <div><span style={{ color: '#f59e0b' }}>PATCH</span> /api/grants/{`{semester}`}</div>
        </div>
      </Card>

      <Card padding={0}>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Mavjud kalitlar ({s.apiKeys.length})</div>
          <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>Kalitni faqat bir marta to‘liq ko‘rsatamiz</div>
        </div>
        {s.apiKeys.length === 0 ? <Empty icon={Icons.key} title="Hozircha kalit yo'q" /> : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: T.bg, borderBottom: `1px solid ${T.border}` }}>
                {['Nom', 'Kalit', 'Yaratilgan', 'Oxirgi marta', 'So‘rovlar', ''].map((h, i) => (
                  <th key={i} style={{
                    textAlign: ['So‘rovlar'].includes(h) ? 'right' : 'left',
                    padding: '11px 16px', fontSize: 11.5, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em',
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {s.apiKeys.map((k, i) => (
                <tr key={k.id} style={{ borderBottom: i < s.apiKeys.length - 1 ? `1px solid ${T.border}` : 'none' }}>
                  <td style={{ padding: '11px 16px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 28, height: 28, borderRadius: 6, background: T.bg, display: 'grid', placeItems: 'center', border: `1px solid ${T.border}` }}><Icons.key size={13} stroke={T.textMuted} /></div>
                      <span style={{ fontWeight: 500 }}>{k.name}</span>
                    </div>
                  </td>
                  <td style={{ padding: '11px 16px' }}>
                    <code style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11.5, padding: '2px 7px', background: T.bg, borderRadius: 4, border: `1px solid ${T.border}` }}>{k.key}</code>
                    <button onClick={() => copy(k.key)} style={{ marginLeft: 4, padding: 4, border: 0, background: 'transparent', cursor: 'pointer', color: T.textMuted }}><Icons.copy size={12} /></button>
                  </td>
                  <td style={{ padding: '11px 16px', color: T.textMuted, fontSize: 12.5 }}>{k.created}</td>
                  <td style={{ padding: '11px 16px', color: T.textMuted, fontSize: 12.5 }}>{k.lastUsed}</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{k.requests.toLocaleString()}</td>
                  <td style={{ padding: '11px 16px', textAlign: 'right' }}>
                    <Button size="iconSm" variant="ghost" onClick={() => { s.removeApiKey(k.id); s.toast({ kind: 'warning', title: 'Kalit o‘chirildi' }); }} title="O'chirish"><Icons.trash size={13} stroke={T.red} /></Button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>

      <Dialog open={open} onClose={() => setOpen(false)} title={newKey ? 'Kalit yaratildi' : 'Yangi API kalit'}
        description={newKey ? 'Bu kalitni faqat bir marta ko‘rsatamiz. Xavfsiz joyda saqlang.' : 'Kalitni qaysi tizim foydalanishini aniq belgilang'}
        footer={newKey ? <Button variant="primary" onClick={() => { setOpen(false); setNewKey(null); }}>Yopish</Button>
          : <><Button variant="outline" onClick={() => setOpen(false)}>Bekor qilish</Button>
              <Button variant="primary" onClick={create} icon={<Icons.plus size={13} />}>Yaratish</Button></>}>
        {!newKey ? (
          <Field label="Nom" hint="Masalan: HEMIS sync (production)">
            <Input value={name} onChange={e => setName(e.target.value)} placeholder="Integratsiya nomi" />
          </Field>
        ) : (
          <div>
            <div style={{ padding: 14, background: T.emeraldBg, border: `1px solid #a7f3d0`, borderRadius: 8, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icons.checkCircle size={18} stroke={T.emerald} />
              <div style={{ flex: 1, fontSize: 13, color: T.emeraldText }}>Yangi kalit yaratildi. Bu kalit boshqa hech qachon ko‘rsatilmaydi.</div>
            </div>
            <div style={{ padding: 12, background: T.bg, border: `1px solid ${T.border}`, borderRadius: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
              <code style={{ flex: 1, fontFamily: 'JetBrains Mono, monospace', fontSize: 13, color: T.text, wordBreak: 'break-all' }}>{newKey}</code>
              <Button size="sm" variant="outline" icon={<Icons.copy size={13} />} onClick={() => copy(newKey)}>Nusxalash</Button>
            </div>
          </div>
        )}
      </Dialog>
    </AppShell>
  );
}

Object.assign(window, {
  PageAdminDashboard, PageAdminStudents, PageAdminAchievements,
  PageAdminPenalties, PageAdminGrants, PageAdminRating, PageAdminIntegrations,
});

</script>

<script type="text/babel" data-src="app.jsx">
// app.jsx — main entry. Routes by role + page slug, renders shell + toaster + demo switcher.

const ROUTES = {
  // Public routes (no role / unauthed)
  rating: PagePublicRating,
  about:  PagePublicAbout,
  badges: PagePublicBadges,
  login:  PageLogin,

  // Per-role pages live under their role
  student: {
    dashboard:    PageStudentDashboard,
    profile:      PageStudentProfile,
    rating:       PageStudentRating,
    achievements: PageStudentAchievements,
    feedbacks:    PageStudentFeedbacks,
    public:       PageStudentPublic,
  },
  mentor: {
    dashboard:  PageMentorDashboard,
    students:   PageMentorStudents,
    feedback:   PageMentorFeedback,
    discipline: PageMentorDiscipline,
    // legacy redirect: if user lands on /mentor/attendance, show the deprecation notice
    attendance: PageMentorAttendance,
  },
  admin: {
    dashboard:    PageAdminDashboard,
    // students route removed — Reyting is the new students-with-data view
    students:     PageAdminRating,
    rating:       PageAdminRating,
    achievements: PageAdminAchievements,
    penalties:    PageAdminPenalties,
    grants:       PageAdminGrants,
    integrations: PageAdminIntegrations,
  },
};

function Router() {
  const s = useStore();

  // Unauthed: only login + public rating + public about + public badges accessible
  if (!s.authed) {
    if (s.route === 'rating') return <PagePublicRating />;
    if (s.route === 'about')  return <PagePublicAbout />;
    if (s.route === 'badges') return <PagePublicBadges />;
    return <PageLogin />;
  }

  // Authed: per-role
  const roleRoutes = ROUTES[s.role];
  if (!roleRoutes) {
    return (
      <div style={{ padding: 40 }}>
        <PageTitle title="Tanlangan rol mavjud emas" />
      </div>
    );
  }
  const Page = roleRoutes[s.route] || roleRoutes.dashboard;
  return <Page />;
}

function App() {
  return (
    <AppStoreProvider>
      <div style={{
        width: '100vw', height: '100vh',
        position: 'relative', overflow: 'hidden',
        background: T.bg,
      }}>
        <Router />
        <RoleSwitcher />
        <Toaster />
      </div>
    </AppStoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
