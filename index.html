// =========================================
// Per-student score breakdown + grant reason + risk
// Matches API JSON shape (academicPct, academic, ... + breakdown.total etc).
// =========================================
function _round1(x) { return Math.round(x * 10) / 10; }
function _clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function _seed(id, n) { let x = id * 1000 + n; x = (x * 9301 + 49297) % 233280; return x / 233280; }

function _deriveDetails(s) {
  const academicPct  = s.gpa;
  const academic     = _round1(academicPct * 40 / 100);
  const attendancePct= s.attendance;
  const attendanceBl = _round1(attendancePct * 20 / 100);
  const projectPct   = Math.round(_clamp(s.gpa - 6 + (_seed(s.id, 1) - 0.5) * 25, 45, 100) * 10) / 10;
  const projects     = _round1(projectPct * 15 / 100);
  const activityPct  = Math.round(_clamp(40 + _seed(s.id, 2) * 60, 30, 100) * 10) / 10;
  const activity     = _round1(activityPct * 10 / 100);
  const tutorPct     = Math.round(_clamp(70 + _seed(s.id, 3) * 30, 60, 100) * 10) / 10;
  const tutor        = _round1(tutorPct * 5 / 100);
  const disciplinePct= Math.round(_clamp(70 + _seed(s.id, 4) * 30, 55, 100) * 10) / 10;
  const discipline   = _round1(disciplinePct * 10 / 100);

  // Sparse bonuses & penalties for realistic variety
  const penalty   = (s.id === 12) ? -3 : (s.id === 22) ? -5 : (s.id === 11) ? -1 : 0;
  const recovery  = (s.id === 11) ? 1 : 0;
  const employment= (s.id === 1) ? 10 : (s.id === 3) ? 8 : (s.id === 17) ? 6 : 0;

  const total      = _round1(academic + attendanceBl + projects + activity + tutor + discipline);
  const finalScore = _round1(total + penalty + recovery + employment);

  // Determine reason + risk based on existing status
  let grantReason, riskLevel;
  if (s.status === 'GRANTED') {
    grantReason = 'GRANTED_OK';
    riskLevel   = 'LOW';
  } else if (s.status === 'PENDING') {
    grantReason = 'PENDING';
    riskLevel   = finalScore >= 80 ? 'LOW' : (finalScore >= 75 ? 'MEDIUM' : 'HIGH');
  } else {
    // NOT_GRANTED — assign reason
    if (s.gpa < 75) {
      grantReason = 'ACADEMIC_FAIL';
      riskLevel   = 'HIGH';
    } else if (s.id === 18 || s.id === 24) {
      grantReason = 'PAYMENT_OVERDUE';
      riskLevel   = 'MEDIUM';
    } else {
      grantReason = 'LOW_SCORE';
      riskLevel   = finalScore < 70 ? 'HIGH' : 'MEDIUM';
    }
  }

  const academicStanding = (s.gpa < 65 || s.attendance < 60) ? 'SUSPENDED' : 'ACTIVE';

  return {
    grantReason, riskLevel, academicStanding,
    breakdown: {
      academicPct, academic,
      attendancePct, attendance: attendanceBl,
      projectPct, projects,
      activityPct, activity,
      tutorPct, tutor,
      disciplinePct, discipline,
      penalty, recovery, employment,
      total, finalScore,
    },
  };
}

// Helper: get earned badges (with full def) for a student
function getStudentBadges(studentId) {
  const earned = STUDENT_BADGES[studentId] || [];
  return earned.map(e => {
    const def = BADGES.find(b => b.slug === e.slug);
    return def ? { ...def, earnedAt: e.earnedAt } : null;
  }).filter(Boolean);
}

const fmtDate = (s) => {
  const d = new Date(s);
  const months = ['yan', 'fev', 'mar', 'apr', 'may', 'iyn', 'iyl', 'avg', 'sen', 'okt', 'noy', 'dek'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
};

const fmtRelative = (s) => {
  const d = new Date(s);
  const now = new Date('2026-05-15'); // demo "now"
  const diff = Math.round((now - d) / 86400000);
  if (diff === 0) return 'Bugun';
  if (diff === 1) return 'Kecha';
  if (diff < 7) return `${diff} kun oldin`;
  if (diff < 30) return `${Math.round(diff / 7)} hafta oldin`;
  return `${Math.round(diff / 30)} oy oldin`;
};

const _statusColor = (status) => ({
  GRANTED:     { bg: T.emeraldBg, fg: T.emeraldText, dot: T.emerald },
  PENDING:     { bg: T.amberBg,   fg: T.amberText,   dot: T.amber   },
  NOT_GRANTED: { bg: T.redBg,     fg: T.redText,     dot: T.red     },
  APPROVED:    { bg: T.emeraldBg, fg: T.emeraldText, dot: T.emerald },
  REJECTED:    { bg: T.redBg,     fg: T.redText,     dot: T.red     },
  UNKNOWN:     { bg: T.slate100,  fg: '#475569',     dot: '#94a3b8' },
}[status] || { bg: T.slate100, fg: '#475569', dot: '#94a3b8' });

  T, GROUPS, MENTORS, STUDENTS, ME_STUDENT, ME_MENTOR,
  SCORE_BREAKDOWN, ME_PENALTY, ME_RECOVERY, ME_EMPLOY, GROWTH_DATA,
  ACHIEVEMENTS, ACHIEVEMENT_TYPES, FEEDBACKS,
  PENALTY_TYPES, PENALTIES, ATTENDANCE_DEFAULT, API_KEYS,
  STATUS_LABEL, TYPE_LABEL, TYPE_ICON_KEY,
  GRANT_REASON_LABEL, GRANT_REASON_LABEL_SHORT, RISK_LABEL, RISK_LABEL_SHORT, RISK_COLOR, STANDING_LABEL,
  STUDENT_LMS_DATA, CERTIFICATES, CERT_TYPES, CERT_TYPE_LABEL,
  BADGES, BADGE_CATEGORY_LABEL, STUDENT_BADGES, getStudentBadges,
  Icons, Icon, fmtDate, fmtRelative, _statusColor,
});

<script type="text/babel" data-src="ui.jsx">
// ui.jsx — shadcn-style primitives for EduMetric.

// =========================================
// AppStore — global state via Context
// =========================================
const StoreCtx = React.createContext(null);

function AppStoreProvider({ children, initialRole = 'student', initialRoute = 'dashboard', initialAuthed = true, initialSidebar = true }) {
  // Role + route
  const [role, setRole]           = React.useState(initialRole);   // 'student' | 'mentor' | 'admin' | 'guest'
  const [route, setRoute]         = React.useState(initialRoute); // page slug
  const [authed, setAuthed]       = React.useState(initialAuthed);
  const [sidebarOpen, setSidebar] = React.useState(initialSidebar);

  // Domain state
  const [students,    setStudents]    = React.useState(STUDENTS);
  const [achievements,setAchievements]= React.useState(ACHIEVEMENTS);
  const [feedbacks,   setFeedbacks]   = React.useState(FEEDBACKS);
  const [penalties,   setPenalties]   = React.useState(PENALTIES);
  const [attendance,  setAttendance]  = React.useState(ATTENDANCE_DEFAULT);
  const [apiKeys,     setApiKeys]     = React.useState(API_KEYS);
  const [certificates, setCertificates] = React.useState(window.CERTIFICATES || []);

  // Selected students transferred from Reyting → Grant qarori
  const [selectedForGrant, setSelectedForGrant] = React.useState([]);

  // Used by Student Public Profile (route param)
  const [viewStudentId, setViewStudentId] = React.useState(null);

  const addCertificate = (cert) => {
    const id = Math.max(0, ...certificates.map(c => c.id), 0) + 1;
    setCertificates(arr => [{ id, status: 'PENDING', date: '2026-05-15', ...cert }, ...arr]);
  };

  // Toasts
  const [toasts, setToasts] = React.useState([]);
  const toast = React.useCallback((opts) => {
    const id = Math.random().toString(36).slice(2);
    const t = typeof opts === 'string'
      ? { id, kind: 'default', title: opts }
      : { id, kind: 'default', ...opts };
    setToasts(arr => [...arr, t]);
    setTimeout(() => setToasts(arr => arr.filter(x => x.id !== id)), t.duration || 3800);
  }, []);
  const dismissToast = React.useCallback((id) => {
    setToasts(arr => arr.filter(x => x.id !== id));
  }, []);

  // Navigate helper — sets role+route at once and ensures auth
  const go = React.useCallback((nextRoute, nextRole) => {
    if (nextRole) setRole(nextRole);
    setRoute(nextRoute);
  }, []);

  // Actions — keep these as named methods so pages call store.grant(id) etc.
  const grant = (id) => {
    setStudents(arr => arr.map(s => s.id === id ? { ...s, status: 'GRANTED' } : s));
  };
  const revoke = (id) => {
    setStudents(arr => arr.map(s => s.id === id ? { ...s, status: 'PENDING' } : s));
  };
  const setStudentStatus = (id, status) => {
    setStudents(arr => arr.map(s => s.id === id ? { ...s, status } : s));
  };

  const approveAchievement = (id, pts) => {
    setAchievements(arr => arr.map(a => a.id === id ? { ...a, status: 'APPROVED', points: pts ?? a.points } : a));
  };
  const rejectAchievement = (id, reason) => {
    setAchievements(arr => arr.map(a => a.id === id ? { ...a, status: 'REJECTED', reject: reason } : a));
  };
  const addAchievement = (a) => {
    const id = Math.max(0, ...achievements.map(x => x.id)) + 1;
    setAchievements(arr => [{ id, status: 'PENDING', points: 0, ...a }, ...arr]);
  };

  const addFeedback = (f) => {
    const id = Math.max(0, ...feedbacks.map(x => x.id)) + 1;
    setFeedbacks(arr => [{ id, ...f }, ...arr]);
  };

  const addPenalty = (p) => {
    const id = Math.max(0, ...penalties.map(x => x.id)) + 1;
    setPenalties(arr => [{ id, ...p }, ...arr]);
  };
  const assignRecovery = (id, task) => {
    setPenalties(arr => arr.map(p => p.id === id ? { ...p, recoveryAssigned: true, recoveryTask: task } : p));
  };
  const completeRecovery = (id) => {
    setPenalties(arr => arr.map(p => p.id === id ? { ...p, recoveryDone: true } : p));
  };

  const setAttendanceFor = (studentId, val) => {
    setAttendance(a => ({ ...a, [studentId]: val }));
  };

  const addApiKey = (name) => {
    const id = 'k' + (Math.max(0, ...apiKeys.map(k => parseInt(k.id.slice(1)))) + 1);
    const key = 'em_pk_' + Math.random().toString(36).slice(2, 10) + '...' + Math.random().toString(36).slice(2, 6);
    setApiKeys(arr => [{ id, name, key, created: '2026-05-15', lastUsed: '—', requests: 0 }, ...arr]);
    return key;
  };
  const removeApiKey = (id) => setApiKeys(arr => arr.filter(k => k.id !== id));

  const value = {
    role, setRole, route, setRoute, go,
    authed, setAuthed,
    sidebarOpen, setSidebar,
    students, setStudents,
    achievements, setAchievements,
    feedbacks, setFeedbacks,
    penalties, setPenalties,
    attendance, setAttendance, setAttendanceFor,
    apiKeys, addApiKey, removeApiKey,
    selectedForGrant, setSelectedForGrant,
    viewStudentId, setViewStudentId,
    certificates, addCertificate,
    toasts, toast, dismissToast,
    grant, revoke, setStudentStatus,
    approveAchievement, rejectAchievement, addAchievement,
    addFeedback,
    addPenalty, assignRecovery, completeRecovery,
  };
  return <StoreCtx.Provider value={value}>{children}</StoreCtx.Provider>;
}

const useStore = () => React.useContext(StoreCtx);

// =========================================
// Button
// =========================================
const Button = ({ children, variant = 'primary', size = 'md', icon, iconRight, onClick, disabled, style, type, title, fullWidth }) => {
  const sizes = {
    xs: { p: '4px 8px',  fs: 11.5, h: 26, gap: 4 },
    sm: { p: '6px 12px', fs: 12.5, h: 32, gap: 6 },
    md: { p: '8px 16px', fs: 13.5, h: 38, gap: 7 },
    lg: { p: '10px 20px',fs: 14.5, h: 44, gap: 8 },
    icon:{ p: '0',       fs: 12,   h: 32, w: 32, gap: 0 },
    iconSm:{ p: '0',     fs: 11,   h: 28, w: 28, gap: 0 },
  };
  const s = sizes[size];
  const variants = {
    primary: { bg: T.slate900,   fg: '#fff',       bd: T.slate900,   hov: T.slate800 },
    secondary:{bg: T.bgSubtle,   fg: T.text,       bd: T.bgSubtle,   hov: '#e2e8f0' },
    outline: { bg: T.white,      fg: T.text,       bd: T.border,     hov: T.bgSubtle },
    ghost:   { bg: 'transparent',fg: T.text,       bd: 'transparent',hov: T.bgSubtle },
    success: { bg: T.emerald,    fg: '#fff',       bd: T.emerald,    hov: T.emeraldDeep },
    danger:  { bg: T.red,        fg: '#fff',       bd: T.red,        hov: T.redDeep },
    dangerO: { bg: T.white,      fg: T.redDeep,    bd: '#fecaca',    hov: '#fef2f2' },
    link:    { bg: 'transparent',fg: T.text,       bd: 'transparent',hov: 'transparent' },
  };
  const v = variants[variant];
  const [hov, setHov] = React.useState(false);
  return (
    <button
      type={type || 'button'}
      onClick={onClick}
      disabled={disabled}
      title={title}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: s.gap,
        padding: s.p, height: s.h, width: size === 'icon' || size === 'iconSm' ? s.w : (fullWidth ? '100%' : undefined),
        background: disabled ? T.bgSubtle : (hov ? v.hov : v.bg),
        color: disabled ? T.textSubtle : v.fg,
        border: `1px solid ${disabled ? T.border : (hov ? v.hov : v.bd)}`,
        borderRadius: 8, fontSize: s.fs, fontWeight: 500,
        cursor: disabled ? 'not-allowed' : 'pointer',
        whiteSpace: 'nowrap', transition: 'background .12s, color .12s, border-color .12s',
        textDecoration: variant === 'link' && hov ? 'underline' : 'none',
        ...style,
      }}>
      {icon}
      {children}
      {iconRight}
    </button>
  );
};

// =========================================
// Card
// =========================================
const Card = ({ children, style, padding, header, footer, hoverable }) => (
  <div style={{
    background: T.white, border: `1px solid ${T.border}`,
    borderRadius: 12, display: 'flex', flexDirection: 'column',
    transition: 'border-color .15s, box-shadow .15s',
    ...(hoverable ? { cursor: 'pointer' } : {}),
    ...style,
  }}
    onMouseEnter={hoverable ? (e) => { e.currentTarget.style.borderColor = T.borderStrong; e.currentTarget.style.boxShadow = '0 2px 8px rgba(15,23,42,.04)'; } : undefined}
    onMouseLeave={hoverable ? (e) => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.boxShadow = 'none'; } : undefined}
  >
    {header && (
      <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.border}` }}>
        {header}
      </div>
    )}
    <div style={{ padding: padding ?? 18, flex: 1, minHeight: 0 }}>{children}</div>
    {footer && (
      <div style={{ padding: '12px 18px', borderTop: `1px solid ${T.border}`, background: T.bg }}>
        {footer}
      </div>
    )}
  </div>
);

// =========================================
// Badge
// =========================================
const Badge = ({ children, status, variant, style, size = 'md' }) => {
  const sizes = { sm: { fs: 10.5, p: '2px 7px' }, md: { fs: 11.5, p: '3px 8px' } };
  const sz = sizes[size];
  if (status) {
    const c = _statusColor(status);
    return (
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 5,
        padding: sz.p, borderRadius: 999, background: c.bg, color: c.fg,
        fontSize: sz.fs, fontWeight: 500, lineHeight: 1.4, whiteSpace: 'nowrap', ...style,
      }}>
        <span style={{ width: 6, height: 6, borderRadius: 999, background: c.dot }} />
        {children || STATUS_LABEL[status]}
      </span>
    );
  }
  const variants = {
    default: { bg: T.bgSubtle, fg: T.text       },
    muted:   { bg: T.bgSubtle, fg: T.textMuted  },
    outline: { bg: T.white,    fg: T.text, bd: T.border },
    emerald: { bg: T.emeraldBg,fg: T.emeraldText },
    amber:   { bg: T.amberBg,  fg: T.amberText },
    red:     { bg: T.redBg,    fg: T.redText },
    blue:    { bg: T.blueBg,   fg: T.blueText },
  };
  const v = variants[variant || 'default'];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: sz.p, borderRadius: 999, background: v.bg, color: v.fg,
      fontSize: sz.fs, fontWeight: 500, lineHeight: 1.4, whiteSpace: 'nowrap',
      border: v.bd ? `1px solid ${v.bd}` : 'none', ...style,
    }}>{children}</span>
  );
};

// =========================================
// Input
// =========================================
const Input = React.forwardRef(({ icon, iconRight, error, style, fullWidth, size = 'md', ...rest }, ref) => {
  const sizes = { sm: { h: 30, fs: 12.5 }, md: { h: 36, fs: 13.5 }, lg: { h: 42, fs: 14 } };
  const sz = sizes[size];
  return (
    <div style={{ position: 'relative', width: fullWidth !== false ? '100%' : 'auto', ...style }}>
      {icon && <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: T.textSubtle, pointerEvents: 'none' }}>{icon}</span>}
      <input ref={ref} {...rest} style={{
        width: '100%', height: sz.h,
        padding: `0 ${iconRight ? 32 : 12}px 0 ${icon ? 32 : 12}px`,
        border: `1px solid ${error ? T.red : T.border}`,
        borderRadius: 8, fontSize: sz.fs,
        background: T.white, color: T.text, outline: 'none',
        fontFamily: 'inherit', transition: 'border-color .12s, box-shadow .12s',
      }}
      onFocus={(e) => { e.target.style.borderColor = T.slate900; e.target.style.boxShadow = '0 0 0 3px rgba(15,23,42,.06)'; }}
      onBlur={(e)  => { e.target.style.borderColor = error ? T.red : T.border; e.target.style.boxShadow = 'none'; }}
      />
      {iconRight && <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', color: T.textSubtle }}>{iconRight}</span>}
    </div>
  );
});

const Textarea = ({ rows = 4, error, style, ...rest }) => (
  <textarea rows={rows} {...rest} style={{
    width: '100%', padding: '8px 12px',
    border: `1px solid ${error ? T.red : T.border}`,
    borderRadius: 8, fontSize: 13.5, lineHeight: 1.5,
    background: T.white, color: T.text, outline: 'none',
    fontFamily: 'inherit', resize: 'vertical', transition: 'border-color .12s, box-shadow .12s',
    ...style,
  }}
  onFocus={(e) => { e.target.style.borderColor = T.slate900; e.target.style.boxShadow = '0 0 0 3px rgba(15,23,42,.06)'; }}
  onBlur={(e)  => { e.target.style.borderColor = error ? T.red : T.border; e.target.style.boxShadow = 'none'; }}
  />
);

// =========================================
// Select (native, styled)
// =========================================
const Select = ({ value, onChange, options, placeholder, size = 'md', style, fullWidth, icon }) => {
  const sizes = { sm: { h: 30, fs: 12.5 }, md: { h: 36, fs: 13.5 } };
  const sz = sizes[size];
  return (
    <div style={{ position: 'relative', width: fullWidth !== false ? '100%' : 'auto', ...style }}>
      {icon && <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: T.textSubtle, pointerEvents: 'none' }}>{icon}</span>}
      <select value={value || ''} onChange={(e) => onChange?.(e.target.value)} style={{
        width: '100%', height: sz.h,
        padding: `0 32px 0 ${icon ? 32 : 12}px`,
        border: `1px solid ${T.border}`, borderRadius: 8, fontSize: sz.fs,
        background: T.white, color: value ? T.text : T.textSubtle,
        appearance: 'none', WebkitAppearance: 'none', cursor: 'pointer',
        fontFamily: 'inherit', outline: 'none',
      }}
      onFocus={(e) => { e.target.style.borderColor = T.slate900; e.target.style.boxShadow = '0 0 0 3px rgba(15,23,42,.06)'; }}
      onBlur={(e)  => { e.target.style.borderColor = T.border; e.target.style.boxShadow = 'none'; }}
      >
        {placeholder && <option value="" disabled>{placeholder}</option>}
        {options.map((o, i) => {
          const v = typeof o === 'string' ? o : o.value;
          const l = typeof o === 'string' ? o : o.label;
          return <option key={i} value={v}>{l}</option>;
        })}
      </select>
      <Icons.chevdown size={14} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', color: T.textSubtle, pointerEvents: 'none' }} />
    </div>
  );
};

// =========================================
// Label, Field, Form
// =========================================
const Label = ({ children, htmlFor, optional, hint }) => (
  <label htmlFor={htmlFor} style={{ display: 'block', fontSize: 12.5, fontWeight: 500, color: T.text, marginBottom: 6 }}>
    {children}
    {optional && <span style={{ color: T.textSubtle, fontWeight: 400, marginLeft: 4 }}>(ixtiyoriy)</span>}
    {hint && <span style={{ color: T.textSubtle, fontWeight: 400, marginLeft: 8, fontSize: 11.5 }}>{hint}</span>}
  </label>
);

const Field = ({ label, optional, hint, error, children, htmlFor }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <Label htmlFor={htmlFor} optional={optional} hint={hint}>{label}</Label>}
    {children}
    {error && <div style={{ fontSize: 11.5, color: T.redDeep, marginTop: 4 }}>{error}</div>}
  </div>
);

// =========================================
// Switch
// =========================================
const Switch = ({ checked, onChange, label, disabled }) => (
  <label style={{ display: 'inline-flex', alignItems: 'center', gap: 8, cursor: disabled ? 'not-allowed' : 'pointer' }}>
    <span
      onClick={() => !disabled && onChange?.(!checked)}
      style={{
        width: 34, height: 20, borderRadius: 999, padding: 2,
        background: checked ? T.slate900 : T.borderStrong,
        transition: 'background .15s', position: 'relative',
      }}>
      <span style={{
        position: 'absolute', top: 2, left: checked ? 16 : 2,
        width: 16, height: 16, borderRadius: 999, background: '#fff',
        transition: 'left .15s', boxShadow: '0 1px 2px rgba(0,0,0,.2)',
      }} />
    </span>
    {label && <span style={{ fontSize: 13 }}>{label}</span>}
  </label>
);

// =========================================
// Tabs
// =========================================
const Tabs = ({ value, onChange, items, style }) => (
  <div role="tablist" style={{
    display: 'inline-flex', padding: 3, borderRadius: 9,
    background: T.bgSubtle, gap: 2, ...style,
  }}>
    {items.map(it => {
      const isActive = it.id === value;
      return (
        <button key={it.id} role="tab" aria-selected={isActive} onClick={() => onChange?.(it.id)} style={{
          padding: '6px 12px', borderRadius: 7, border: 0,
          background: isActive ? T.white : 'transparent',
          color: isActive ? T.text : T.textMuted,
          fontWeight: isActive ? 500 : 400, fontSize: 12.5,
          cursor: 'pointer', transition: 'background .12s, color .12s',
          boxShadow: isActive ? '0 1px 2px rgba(15,23,42,.04)' : 'none',
          display: 'inline-flex', alignItems: 'center', gap: 6,
        }}>
          {it.label}
          {it.count != null && (
            <span style={{
              fontSize: 10.5, padding: '0 5px', borderRadius: 999,
              background: isActive ? T.bgSubtle : T.bgSubtle,
              color: T.textMuted, fontVariantNumeric: 'tabular-nums', minWidth: 16, height: 16,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            }}>{it.count}</span>
          )}
        </button>
      );
    })}
  </div>
);

// =========================================
// Dialog (modal)
// =========================================
const Dialog = ({ open, onClose, title, description, children, footer, size = 'md', preventClose }) => {
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape' && !preventClose) onClose?.(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose, preventClose]);
  if (!open) return null;
  const widths = { sm: 380, md: 520, lg: 720, xl: 920 };
  return (
    <div style={{
      position: 'absolute', inset: 0, background: 'rgba(15,23,42,.45)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50,
      animation: 'em-fade-in .15s ease-out',
    }} onClick={() => !preventClose && onClose?.()}>
      <div onClick={e => e.stopPropagation()} style={{
        width: widths[size], maxWidth: 'calc(100% - 40px)',
        maxHeight: 'calc(100% - 40px)', overflow: 'auto',
        background: T.white, borderRadius: 12, boxShadow: '0 20px 60px rgba(15,23,42,.25), 0 0 0 1px rgba(15,23,42,.05)',
        animation: 'em-pop-in .18s ease-out', display: 'flex', flexDirection: 'column',
      }}>
        {(title || onClose) && (
          <div style={{ padding: '18px 22px 4px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              {title && <div style={{ fontSize: 16, fontWeight: 600, letterSpacing: '-0.01em' }}>{title}</div>}
              {description && <div style={{ fontSize: 13, color: T.textMuted, marginTop: 4 }}>{description}</div>}
            </div>
            {!preventClose && (
              <button onClick={onClose} style={{
                width: 28, height: 28, border: 0, background: 'transparent',
                color: T.textMuted, cursor: 'pointer', borderRadius: 6,
                display: 'grid', placeItems: 'center', flexShrink: 0,
              }}><Icons.x size={16} /></button>
            )}
          </div>
        )}
        <div style={{ padding: '14px 22px 4px' }}>{children}</div>
        {footer && (
          <div style={{ padding: '16px 22px 18px', display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            {footer}
          </div>
        )}
      </div>
    </div>
  );
};

// =========================================
// Sheet (right-side panel)
// =========================================
const Sheet = ({ open, onClose, title, description, children, footer, width = 440 }) => {
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose?.(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div style={{
      position: 'absolute', inset: 0, background: 'rgba(15,23,42,.35)',
      zIndex: 40, animation: 'em-fade-in .15s ease-out',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        position: 'absolute', top: 0, right: 0, height: '100%',
        width, maxWidth: 'calc(100% - 60px)',
        background: T.white, boxShadow: '-12px 0 32px rgba(15,23,42,.12)',
        display: 'flex', flexDirection: 'column',
        animation: 'em-slide-rt .22s cubic-bezier(.2,.7,.3,1)',
      }}>
        {(title || onClose) && (
          <div style={{ padding: '18px 22px', borderBottom: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              {title && <div style={{ fontSize: 16, fontWeight: 600 }}>{title}</div>}
              {description && <div style={{ fontSize: 13, color: T.textMuted, marginTop: 4 }}>{description}</div>}
            </div>
            <button onClick={onClose} style={{
              width: 28, height: 28, border: 0, background: 'transparent',
              color: T.textMuted, cursor: 'pointer', borderRadius: 6,
              display: 'grid', placeItems: 'center', flexShrink: 0,
            }}><Icons.x size={16} /></button>
          </div>
        )}
        <div style={{ flex: 1, overflow: 'auto', padding: '18px 22px' }}>
          {children}
        </div>
        {footer && (
          <div style={{ padding: '14px 22px', borderTop: `1px solid ${T.border}`, background: T.bg, display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            {footer}
          </div>
        )}
      </div>
    </div>
  );
};

// =========================================
// DropdownMenu (positioned)
// =========================================
const DropdownMenu = ({ trigger, items, align = 'right' }) => {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onClickAway = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onClickAway);
    return () => document.removeEventListener('mousedown', onClickAway);
  }, [open]);
  return (
    <div ref={ref} style={{ position: 'relative', display: 'inline-block' }}>
      <span onClick={() => setOpen(o => !o)}>{trigger}</span>
      {open && (
        <div style={{
          position: 'absolute', top: '100%', [align]: 0, marginTop: 4,
          background: T.white, border: `1px solid ${T.border}`, borderRadius: 8,
          boxShadow: '0 6px 24px rgba(15,23,42,.12)', padding: 4, minWidth: 180, zIndex: 30,
          animation: 'em-pop-in .14s ease-out',
        }}>
          {items.map((it, i) => (
            it.separator ? <div key={i} style={{ height: 1, background: T.border, margin: '4px 0' }} /> :
            <button key={i} onClick={() => { it.onClick?.(); setOpen(false); }} style={{
              display: 'flex', alignItems: 'center', gap: 8, width: '100%',
              padding: '7px 10px', border: 0, background: 'transparent', cursor: 'pointer',
              fontSize: 13, color: it.danger ? T.redDeep : T.text, borderRadius: 6, textAlign: 'left',
            }}
            onMouseEnter={(e) => e.currentTarget.style.background = T.bgSubtle}
            onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
            >
              {it.icon}
              <span style={{ flex: 1 }}>{it.label}</span>
              {it.shortcut && <span style={{ fontSize: 11, color: T.textSubtle }}>{it.shortcut}</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

// =========================================
// Progress
// =========================================
const Progress = ({ value, max = 100, color, bg, height = 6 }) => {
  const pct = Math.max(0, Math.min(1, value / max));
  return (
    <div style={{ height, background: bg || T.bgSubtle, borderRadius: 999, overflow: 'hidden' }}>
      <div style={{
        height: '100%', width: `${pct * 100}%`,
        background: color || T.emerald,
        transition: 'width .4s cubic-bezier(.2,.7,.3,1)', borderRadius: 999,
      }} />
    </div>
  );
};

// =========================================
// Tooltip (simple)
// =========================================
const Tooltip = ({ children, content, side = 'top' }) => {
  const [show, setShow] = React.useState(false);
  if (!content) return children;
  return (
    <span style={{ position: 'relative', display: 'inline-flex' }}
      onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
      {children}
      {show && (
        <span style={{
          position: 'absolute', bottom: side === 'top' ? '100%' : 'auto',
          top: side === 'bottom' ? '100%' : 'auto', left: '50%',
          transform: `translate(-50%, ${side === 'top' ? '-8px' : '8px'})`,
          background: T.slate900, color: '#fff', fontSize: 11.5,
          padding: '4px 8px', borderRadius: 5, whiteSpace: 'nowrap',
          zIndex: 20, pointerEvents: 'none', boxShadow: '0 2px 8px rgba(0,0,0,.15)',
          maxWidth: 240, whiteSpace: 'normal', textAlign: 'center', minWidth: 60,
        }}>{content}</span>
      )}
    </span>
  );
};

// =========================================
// Avatar
// =========================================
const Avatar = ({ name, color, size = 32, style }) => {
  const initials = name ? name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : '?';
  return (
    <div style={{
      width: size, height: size, borderRadius: 999, background: color || '#fde68a',
      display: 'grid', placeItems: 'center', fontWeight: 600,
      fontSize: Math.round(size * 0.38), color: '#7c2d12', flexShrink: 0,
      ...style,
    }}>{initials}</div>
  );
};

// =========================================
// Empty state
// =========================================
const Empty = ({ icon, title, desc, action }) => {
  const I = icon || Icons.inbox;
  return (
    <div style={{
      padding: '48px 24px', textAlign: 'center', color: T.textMuted,
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
    }}>
      <div style={{ width: 56, height: 56, borderRadius: 999, background: T.bgSubtle, display: 'grid', placeItems: 'center', marginBottom: 12 }}>
        <I size={26} stroke={T.textSubtle} />
      </div>
      <div style={{ fontSize: 14.5, fontWeight: 600, color: T.text }}>{title || 'Hozircha hech narsa yoʻq'}</div>
      {desc && <div style={{ fontSize: 13, marginTop: 4, maxWidth: 360 }}>{desc}</div>}
      {action && <div style={{ marginTop: 14 }}>{action}</div>}
    </div>
  );
};

// =========================================
// Skeleton
// =========================================
const Skeleton = ({ w = '100%', h = 14, r = 6, style }) => (
  <div className="em-skel" style={{ width: w, height: h, borderRadius: r, ...style }} />
);

// =========================================
// Toaster — fixed bottom-right
// =========================================
const Toaster = () => {
  const { toasts, dismissToast } = useStore();
  return (
    <div style={{
      position: 'absolute', bottom: 24, right: 24, zIndex: 80,
      display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'flex-end',
      pointerEvents: 'none',
    }}>
      {toasts.map(t => {
        const kindColor = {
          success: { bd: T.emerald, ic: <Icons.checkCircle size={16} stroke={T.emerald} /> },
          error:   { bd: T.red,     ic: <Icons.xCircle    size={16} stroke={T.red}     /> },
          warning: { bd: T.amber,   ic: <Icons.alert      size={16} stroke={T.amber}   /> },
          default: { bd: T.slate900,ic: <Icons.info       size={16} stroke={T.text}    /> },
        }[t.kind || 'default'];
        return (
          <div key={t.id} style={{
            background: T.white, color: T.text, padding: '12px 14px',
            borderRadius: 10, fontSize: 13, minWidth: 280, maxWidth: 380,
            boxShadow: '0 10px 32px rgba(15,23,42,.16), 0 0 0 1px rgba(15,23,42,.06)',
            display: 'flex', alignItems: 'flex-start', gap: 10,
            borderLeft: `3px solid ${kindColor.bd}`,
            animation: 'em-toast-in .25s cubic-bezier(.2,.7,.3,1)',
            pointerEvents: 'auto',
          }}>
            {kindColor.ic}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 500 }}>{t.title}</div>
              {t.description && <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>{t.description}</div>}
            </div>
            <button onClick={() => dismissToast(t.id)} style={{
              width: 22, height: 22, border: 0, background: 'transparent',
              color: T.textMuted, cursor: 'pointer', display: 'grid', placeItems: 'center', flexShrink: 0,
            }}><Icons.x size={13} /></button>
          </div>
        );
      })}
    </div>
  );
};

// =========================================
// Section title (used on every page)
// =========================================
const PageTitle = ({ title, desc, actions, breadcrumb }) => (
  <div style={{ marginBottom: 18 }}>
    {breadcrumb && (
      <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 6 }}>
        {breadcrumb.map((b, i) => (
          <span key={i}>
            {i > 0 && <span style={{ margin: '0 6px', color: T.textSubtle }}>/</span>}
            <span>{b}</span>
          </span>
        ))}
      </div>
    )}
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', gap: 12 }}>
      <div>
        <h1 style={{ fontSize: 22, fontWeight: 600, margin: 0, letterSpacing: '-0.02em' }}>{title}</h1>
        {desc && <p style={{ margin: '4px 0 0', color: T.textMuted, fontSize: 13.5 }}>{desc}</p>}
      </div>
      {actions && <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>{actions}</div>}
    </div>
  </div>
);

// =========================================
// KpiCard
// =========================================
const KpiCard = ({ label, value, sub, trend, trendUp, accent, icon }) => (
  <Card padding={16}>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
      <div style={{ fontSize: 12, color: T.textMuted, fontWeight: 500 }}>{label}</div>
      {icon && <div style={{ width: 26, height: 26, borderRadius: 7, background: T.bgSubtle, display: 'grid', placeItems: 'center', color: T.textMuted }}>{icon}</div>}
    </div>
    <div style={{ marginTop: 8, display: 'flex', alignItems: 'baseline', gap: 4 }}>
      <span style={{ fontSize: 28, fontWeight: 600, letterSpacing: '-0.03em', color: accent || T.text, fontVariantNumeric: 'tabular-nums' }}>{value}</span>
      {sub && <span style={{ fontSize: 13, color: T.textMuted, fontVariantNumeric: 'tabular-nums' }}>{sub}</span>}
    </div>
    {trend && (
      <div style={{ marginTop: 6, fontSize: 11.5, color: trendUp === true ? T.emeraldDeep : trendUp === false ? T.redDeep : T.textMuted, display: 'flex', alignItems: 'center', gap: 3 }}>
        {trendUp === true && <Icons.arrowUp   size={11} />}
        {trendUp === false && <Icons.arrowDown size={11} />}
        {trend}
      </div>
    )}
  </Card>
);

// =========================================
// Stars
// =========================================
const Stars = ({ value = 0, max = 5, size = 14, color = '#f59e0b', interactive, onChange }) => (
  <span style={{ display: 'inline-flex', gap: 2 }}>
    {Array.from({ length: max }).map((_, i) => {
      const filled = i < value;
      return (
        <button key={i} type="button" disabled={!interactive}
          onClick={() => interactive && onChange?.(i + 1)}
          style={{ background: 'transparent', border: 0, padding: 0, cursor: interactive ? 'pointer' : 'default', color, lineHeight: 0 }}>
          <Icons.star filled={filled} size={size} stroke={color} fill={filled ? color : 'none'} />
        </button>
      );
    })}
  </span>
);

Object.assign(window, {
  StoreCtx, AppStoreProvider, useStore,
  Button, Card, Badge, Input, Textarea, Select, Label, Field,
  Switch, Tabs, Dialog, Sheet, DropdownMenu, Progress, Tooltip,
  Avatar, Empty, Skeleton, Toaster, PageTitle, KpiCard, Stars,
});

</script>

// =========================================
// Role / Demo switcher (top-right floating)
// Allows fast demo-walkthrough across roles
// =========================================
const _ROLE_OPTS = [
  { id: 'guest',   label: 'Mehmon', icon: Icons.eye },
  { id: 'student', label: 'Talaba', icon: Icons.graduation },
  { id: 'mentor',  label: 'Mentor', icon: Icons.users },
  { id: 'admin',   label: 'Admin',  icon: Icons.shield },
];

// Single button — pulled out as its own component so React always re-renders
// it cleanly when `role` changes via context. (Inline-mapped buttons inside
// the parent can hold onto stale style closures in some browsers.)
function _RoleBtn({ opt, role, onPick }) {
  const isActive = opt.id === role;
  const I = opt.icon;
  return (
    <button
      type="button"
      onClick={(e) => { e.currentTarget.blur(); onPick(opt.id); }}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        padding: '6px 12px', border: 0, borderRadius: 999, cursor: 'pointer',
        background: isActive ? T.slate900 : 'transparent',
        color: isActive ? '#ffffff' : T.textMuted,
        fontFamily: 'inherit', fontSize: 12.5, fontWeight: 500,
        transition: 'background .15s, color .15s',
        outline: 'none',
      }}
    >
      <I size={13} stroke={isActive ? '#ffffff' : T.textMuted} />
      {opt.label}
    </button>
  );
}

function RoleSwitcher() {
  const { role, setRole, setRoute, setAuthed, authed } = useStore();
  const pick = React.useCallback((id) => {
    if (id === 'guest') {
      setAuthed(false);
      setRole('guest');
      setRoute('rating');
    } else {
      setAuthed(true);
      setRole(id);
      setRoute('dashboard');
    }
  }, [setRole, setRoute, setAuthed]);
  const activeId = !authed ? 'guest' : role;
  return (
    <div
      key={`role-pill-${activeId}`}
      style={{
        position: 'absolute', bottom: 18, left: '50%', transform: 'translateX(-50%)',
        zIndex: 30, background: T.white, padding: 4, borderRadius: 999,
        border: `1px solid ${T.border}`,
        boxShadow: '0 6px 24px rgba(15,23,42,.1)', display: 'flex', gap: 2,
      }}
    >

      {_ROLE_OPTS.map(opt => (
        <_RoleBtn key={opt.id} opt={opt} role={activeId} onPick={pick} />
      ))}
    </div>
  );
}

// =========================================
// AppShell — surrounds page content
// =========================================
function AppShell({ children, breadcrumb }) {
  const s = useStore();
  if (!s.authed || s.role === 'guest') {
    // Public layout: no sidebar, header may differ
    return <div style={{ width: '100%', height: '100%' }}>{children}</div>;

  return (

        <main style={{ flex: 1, overflow: 'auto' }}>
          <div style={{ padding: '24px 28px 32px', minHeight: '100%' }}>
            {children}
          </div>
        </main>
      </div>
    </div>
  );
}

      (course === 'all' || (x.group && x.group.split('-')[1] === course)) &&
      (x.name.toLowerCase().includes(q.toLowerCase()) || x.group.toLowerCase().includes(q.toLowerCase()))

  const top3 = sorted.slice(0, 3);
  const rest = hasFilter ? sorted : sorted.slice(3);
  const startIdx = hasFilter ? 1 : 4;

  const onRowClick = () => setShowLoginModal(true);

  return (
    <PublicChrome active="rating" loginModalState={[showLoginModal, setShowLoginModal]}>

              <div style={{ flex: '0 0 180px', minWidth: 150 }}>
                <Select value={group} onChange={setGroup} options={[{ value: 'all', label: 'Barcha guruhlar' }, ...GROUPS.map(g => ({ value: g, label: g }))]} />
              </div>
              <div style={{ flex: '0 0 150px', minWidth: 130 }}>
                <Select value={course} onChange={setCourse} options={[{ value: 'all', label: 'Barcha kurslar' }, ...courses.map(c => ({ value: c, label: `Kurs 20${c}` }))]} />
              </div>
              <div style={{ marginLeft: 'auto', fontSize: 12, color: T.textMuted, whiteSpace: 'nowrap' }}>
                <span style={{ fontWeight: 500, color: T.text, fontVariantNumeric: 'tabular-nums' }}>{sorted.length}</span> ta talaba
              </div>
            </div>
          </Card>

          {loading ? (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 24 }}>
                {[0, 1, 2].map(i => <Skeleton key={i} h={170} r={14} />)}

              <Skeleton h={400} r={12} />
            </>
          ) : (
            <>

            Reyting har 24 soatda yangilanadi · Avtomatik hisoblash

      </div>
    </PublicChrome>
  );
}

// --- Holat (status + reason) pill ---
function HolatBadge({ reason }) {
  const map = {
    GRANTED_OK:      { bg: T.emeraldBg, fg: T.emeraldText, bd: '#a7f3d0' },
    OK:              { bg: T.emeraldBg, fg: T.emeraldText, bd: '#a7f3d0' },
    PENDING:         { bg: T.amberBg,   fg: T.amberText,   bd: '#fde68a' },
    ACADEMIC_FAIL:   { bg: T.redBg,     fg: T.redText,     bd: '#fecaca' },
    LOW_SCORE:       { bg: T.redBg,     fg: T.redText,     bd: '#fecaca' },
    PAYMENT_OVERDUE: { bg: T.redBg,     fg: T.redText,     bd: '#fecaca' },
  };
  const c = map[reason] || { bg: T.bgSubtle, fg: T.text, bd: T.border };
  const label = (window.GRANT_REASON_LABEL_SHORT || {})[reason] || GRANT_REASON_LABEL[reason] || '—';
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '4px 10px', borderRadius: 999,
      background: c.bg, color: c.fg, border: `1px solid ${c.bd}`,
      fontSize: 11.5, fontWeight: 600, whiteSpace: 'nowrap', letterSpacing: '.01em',
    }}>
      {label}
    </span>
  );
}

// --- Inline badge chips (small, used in rating table) ---
function BadgeChips({ studentId, max = 3 }) {
  const earned = getStudentBadges(studentId);
  if (!earned.length) return null;
  const visible = earned.slice(0, max);
  const rest = earned.length - visible.length;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, marginLeft: 8 }}>
      {visible.map((b, i) => (
        <Tooltip key={b.slug} content={b.name}>
          <span style={{ fontSize: 14, lineHeight: 1, cursor: 'help', display: 'inline-block' }}>{b.icon}</span>
        </Tooltip>
      ))}
      {rest > 0 && (
        <Tooltip content={earned.slice(max).map(b => b.name).join(', ')}>
          <span style={{
            fontSize: 10.5, fontWeight: 600, color: T.textMuted,
            padding: '1px 5px', background: T.bgSubtle, borderRadius: 999,
            cursor: 'help', minWidth: 22, textAlign: 'center',
          }}>+{rest}</span>
        </Tooltip>
      )}
    </span>
  );
}

// --- Rating table with sticky header + solid risk cell ---
function RatingTable({ rows, startIndex, onRowClick }) {
  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13, minWidth: 720 }}>
        <thead>
          <tr style={{ position: 'sticky', top: 0, background: T.bg, zIndex: 1 }}>
            {[
              { l: '#',     a: 'center', w: 56 },
              { l: 'Ism',   a: 'left' },
              { l: 'Guruh', a: 'left',   w: 120 },
              { l: 'Ball',  a: 'right',  w: 90 },
              { l: 'Holat', a: 'left',   w: 170 },
              { l: 'Risk',  a: 'left',   w: 120 },
            ].map((h, i) => (
              <th key={i} style={{
                textAlign: h.a, padding: '11px 16px', fontSize: 11.5,
                fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.04em',
                width: h.w, borderBottom: `1px solid ${T.border}`, whiteSpace: 'nowrap',
              }}>{h.l}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((stu, i) => {
            const rank  = startIndex + i;
            const risk  = RISK_COLOR[stu.riskLevel] || RISK_COLOR.MEDIUM;
            const final = (stu.breakdown && stu.breakdown.finalScore != null) ? stu.breakdown.finalScore : stu.score;
            return (
              <tr key={stu.id} onClick={onRowClick} style={{
                borderBottom: i < rows.length - 1 ? `1px solid ${T.border}` : 'none',
                transition: 'background .12s',
                cursor: onRowClick ? 'pointer' : 'default',
              }}
              onMouseEnter={(e) => { e.currentTarget.querySelectorAll('td.em-hov').forEach(td => td.style.background = T.bgSubtle); }}
              onMouseLeave={(e) => { e.currentTarget.querySelectorAll('td.em-hov').forEach(td => td.style.background = ''); }}
              >
                <td className="em-hov" style={{ padding: '12px 16px', textAlign: 'center', color: T.textMuted, fontVariantNumeric: 'tabular-nums', fontWeight: 500 }}>{rank}</td>
                <td className="em-hov" style={{ padding: '12px 16px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <Avatar name={stu.name} color={stu.avatarColor} size={30} />
                    <span style={{ fontWeight: 500 }}>{stu.name}</span>
                    <BadgeChips studentId={stu.id} />
                  </div>
                </td>
                <td className="em-hov" style={{ padding: '12px 16px', color: T.textMuted }}>{stu.group}</td>
                <td className="em-hov" style={{ padding: '12px 16px', textAlign: 'right', fontWeight: 700, fontVariantNumeric: 'tabular-nums', fontSize: 14, letterSpacing: '-0.01em' }}>
                  {final.toFixed(1)}
                </td>
                <td className="em-hov" style={{ padding: '12px 16px' }}>
                  <HolatBadge reason={stu.grantReason} />
                </td>
                {/* Risk: SOLID color cell */}
                <td style={{
                  padding: '10px 14px', background: risk.bg, color: risk.fg,
                  fontSize: 12, fontWeight: 600, letterSpacing: '.02em',
                  borderBottom: i < rows.length - 1 ? '1px solid rgba(0,0,0,.08)' : 'none',
                }}>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                    {stu.riskLevel === 'HIGH'   && <Icons.alert size={12} />}
                    {stu.riskLevel === 'MEDIUM' && <Icons.clock size={12} />}
                    {stu.riskLevel === 'LOW'    && <Icons.check size={12} strokeWidth={2.5} />}
                    {RISK_LABEL_SHORT[stu.riskLevel] || RISK_LABEL[stu.riskLevel]}
                  </span>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

    activity:  BADGES.filter(b => b.category === 'activity').length,
    aggregate: BADGES.filter(b => b.category === 'aggregate').length,
  };
  const filtered = cat === 'all' ? BADGES : BADGES.filter(b => b.category === cat);

  return (
    <PublicChrome active="badges">
      <div style={{ padding: '44px 32px 0' }}>
        <div style={{ maxWidth: 1080, margin: '0 auto' }}>
          <div style={{ marginBottom: 28 }}>
            <h1 style={{ fontSize: 36, fontWeight: 700, margin: 0, letterSpacing: '-0.035em', lineHeight: 1.05, color: T.text }}>
              Badge'lar
            </h1>
            <p style={{ margin: '10px 0 0', color: T.textMuted, fontSize: 15, maxWidth: 640, lineHeight: 1.55 }}>
              Yutuq, faollik va akademik natijalar uchun avtomatik beriladi
            </p>
          </div>

          <div style={{ marginBottom: 22 }}>
            <Tabs value={cat} onChange={setCat} items={[
              { id: 'all',       label: 'Hammasi',     count: counts.all       },
              { id: 'compete',   label: 'Musobaqa',    count: counts.compete   },
              { id: 'academic',  label: 'Akademik',    count: counts.academic  },
              { id: 'activity',  label: 'Faollik',     count: counts.activity  },
              { id: 'aggregate', label: 'Jamlovchi',   count: counts.aggregate },
            ]} />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
            {filtered.map(b => (
              <BadgeCatalogCard key={b.slug} badge={b} />
            ))}
          </div>
        </div>
      </div>
    </PublicChrome>
  );
}

function BadgeCatalogCard({ badge }) {
  const tintBg = badge.color + '1a';
  return (
    <Card padding={18} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
        <div style={{
          width: 60, height: 60, borderRadius: 14, background: tintBg,
          display: 'grid', placeItems: 'center', fontSize: 30, flexShrink: 0,
          border: `1px solid ${badge.color}33`,
        }}>{badge.icon}</div>
        <span style={{
          fontSize: 10.5, fontWeight: 600, padding: '3px 8px', borderRadius: 999,
          background: T.bgSubtle, color: T.textMuted,
          textTransform: 'uppercase', letterSpacing: '.05em',
        }}>{BADGE_CATEGORY_LABEL[badge.category]}</span>
      </div>
      <div>
        <div style={{ fontSize: 16, fontWeight: 600, letterSpacing: '-0.01em', color: T.text }}>{badge.name}</div>
        <p style={{ margin: '4px 0 0', fontSize: 12.5, lineHeight: 1.55, color: T.textMuted }}>{badge.description}</p>
      </div>
      <div style={{
        marginTop: 'auto', padding: '10px 12px', background: T.bg, border: `1px solid ${T.border}`, borderRadius: 8,
      }}>
        <div style={{ fontSize: 10.5, fontWeight: 600, color: T.textMuted, textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: 4 }}>
          Qanday olinadi
        </div>
        <div style={{ fontSize: 12, color: T.text, lineHeight: 1.5 }}>{badge.howToEarn}</div>
      </div>
    </Card>
  );
}

// --- Full badge grid (for profile + public profile) ---
function BadgeGrid({ studentId, columns = 4 }) {
  const earnedList = getStudentBadges(studentId);
  const earnedMap = Object.fromEntries(earnedList.map(b => [b.slug, b]));
  return (
    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${columns}, 1fr)`, gap: 12 }}>
      {BADGES.map(b => {
        const earned = earnedMap[b.slug];
        const tintBg = (earned ? b.color : '#94a3b8') + '1a';
        return (
          <Tooltip key={b.slug} content={earned ? `${b.name} · ${fmtDate(earned.earnedAt)}` : `${b.name} · Hali olinmagan`}>
            <div style={{
              padding: 14, border: `1px solid ${T.border}`, borderRadius: 12,
              background: T.white, display: 'flex', flexDirection: 'column',
              alignItems: 'center', textAlign: 'center', gap: 8,
              opacity: earned ? 1 : 0.3, filter: earned ? 'none' : 'grayscale(.6)',
              transition: 'opacity .15s, transform .15s', cursor: 'help', width: '100%',
            }}
            onMouseEnter={(e) => { if (earned) e.currentTarget.style.transform = 'translateY(-2px)'; }}
            onMouseLeave={(e) => { e.currentTarget.style.transform = 'none'; }}
            >
              <div style={{
                width: 56, height: 56, borderRadius: 14, background: tintBg,
                display: 'grid', placeItems: 'center', fontSize: 28,
                border: `1px solid ${(earned ? b.color : '#94a3b8')}33`,
              }}>{b.icon}</div>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: T.text, lineHeight: 1.3 }}>{b.name}</div>
              <div style={{ fontSize: 10.5, color: T.textMuted, fontVariantNumeric: 'tabular-nums' }}>
                {earned ? fmtDate(earned.earnedAt) : 'Hali olinmagan'}
              </div>
            </div>
          </Tooltip>
        );
      })}
    </div>
  );
}

</script>

// =========================================
// Certificates section component (used in Profile)
// =========================================
function CertificatesSection() {
  const s = useStore();
  const myCerts = (s.certificates || []).filter(c => c.studentId === ME_STUDENT.id);
  const [dialogOpen, setDialogOpen] = React.useState(false);
  const [form, setForm] = React.useState({ name: '', type: 'CERTIFICATE', desc: '', file: null, fileType: null });

  const submit = () => {
    if (!form.name.trim()) { s.toast({ kind: 'error', title: 'Sertifikat nomini kiriting' }); return; }
    if (!form.file) { s.toast({ kind: 'error', title: 'Fayl yuklang' }); return; }
    s.addCertificate({
      studentId: ME_STUDENT.id,
      name: form.name, type: form.type, desc: form.desc,
      file: form.file, fileType: form.fileType,
    });
    s.toast({ kind: 'success', title: 'Sertifikat yuborildi', description: 'Admin tasdiqlashini kuting' });
    setDialogOpen(false);
    setForm({ name: '', type: 'CERTIFICATE', desc: '', file: null, fileType: null });
  };

  const pickFile = (ft) => {
    setForm(f => ({ ...f, file: `${form.name || 'sertifikat'}-${Date.now()}.${ft}`, fileType: ft }));
  };

  return (
    <Card padding={0} style={{ marginTop: 14 }}>
      <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Mening sertifikatlarim</div>
          <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>{myCerts.length} ta sertifikat · tasdiqlangani grant ballingizga qo‘shiladi</div>
        </div>
        <Button variant="primary" size="sm" icon={<Icons.plus size={13} />} onClick={() => setDialogOpen(true)}>Yangi sertifikat</Button>
      </div>

      {myCerts.length === 0 ? (
        <Empty icon={Icons.award} title="Hozircha sertifikat yo'q"
          desc="Til, kurs yoki professional sertifikatlaringizni qo'shing"
          action={<Button variant="primary" icon={<Icons.plus size={13} />} onClick={() => setDialogOpen(true)}>Sertifikat qo'shish</Button>}
        />
      ) : (
        <div style={{ padding: 14, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
          {myCerts.map(c => <CertCard key={c.id} cert={c} onView={() => s.toast(`${c.file} ochilmoqda`)} />)}
        </div>
      )}

      <Dialog open={dialogOpen} onClose={() => setDialogOpen(false)}
        title="Yangi sertifikat qo'shish"
        description="Sertifikat skani yoki rasmni yuklang. Admin tasdiqlagandan keyin ko'rsatiladi."
        footer={<>
          <Button variant="outline" onClick={() => setDialogOpen(false)}>Bekor qilish</Button>
          <Button variant="primary" onClick={submit} icon={<Icons.send size={13} />}>Yuborish</Button>
        </>}>
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 12 }}>
          <Field label="Sertifikat nomi">
            <Input value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Masalan: IELTS 7.5" />
          </Field>
          <Field label="Tur">
            <Select value={form.type} onChange={v => setForm(f => ({ ...f, type: v }))}
              options={CERT_TYPES.map(t => ({ value: t, label: CERT_TYPE_LABEL[t] }))} />
          </Field>
        </div>
        <Field label="Tavsif" optional>
          <Textarea rows={3} value={form.desc} onChange={e => setForm(f => ({ ...f, desc: e.target.value }))} placeholder="Qisqacha — qachon, qayerda, ball/daraja" />
        </Field>
        <Field label="Fayl yuklash" hint="PDF, PNG yoki JPG · max 5MB">
          <div style={{
            border: `1.5px dashed ${form.file ? T.emerald : T.borderStrong}`, borderRadius: 8, padding: 16,
            background: form.file ? T.emeraldBg : T.bg,
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, cursor: 'pointer',
          }}>
            {form.file ? (
              <>
                <Icons.check size={20} stroke={T.emerald} />
                <div style={{ fontSize: 13, color: T.emeraldText, fontWeight: 500 }}>{form.file}</div>
                <Button size="sm" variant="ghost" onClick={() => setForm(f => ({ ...f, file: null, fileType: null }))}>O'zgartirish</Button>
              </>
            ) : (
              <>
                <Icons.upload size={20} stroke={T.textMuted} />
                <div style={{ fontSize: 12.5, color: T.textMuted }}>Fayl turini tanlang:</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <Button size="sm" variant="outline" onClick={() => pickFile('pdf')} icon={<Icons.fileText size={12} />}>PDF</Button>
                  <Button size="sm" variant="outline" onClick={() => pickFile('png')} icon={<Icons.empty size={12} />}>PNG</Button>
                  <Button size="sm" variant="outline" onClick={() => pickFile('jpg')} icon={<Icons.empty size={12} />}>JPG</Button>
                </div>
              </>
            )}
          </div>
        </Field>
      </Dialog>
    </Card>
  );
}

          <div style={{ width: 92, height: 92, position: 'relative', flexShrink: 0 }}>

              <circle cx="46" cy="46" r="38" fill="none" stroke={tone(overall)} strokeWidth="8"
                strokeLinecap="round"
                strokeDasharray={`${Math.PI * 2 * 38 * overall / 100} ${Math.PI * 2 * 38}`}
                transform="rotate(-90 46 46)" />
            </svg>
            <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', pointerEvents: 'none', textAlign: 'center', fontSize: 11, color: T.textMuted }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: T.text, fontVariantNumeric: 'tabular-nums' }}>{lms.attendance_summary.attended}</div>
                <div style={{ fontSize: 10, color: T.textSubtle }}>/ {lms.attendance_summary.total_lessons}</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ padding: 14, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
        {lms.subjects.map((sub, i) => {
          const p = sub.subject_summary.percentage;
          return (
            <div key={i} style={{
              padding: 14, border: `1px solid ${T.border}`, borderRadius: 10, background: T.white,
              transition: 'border-color .15s, box-shadow .15s', cursor: 'pointer',
            }}
            onClick={() => setOpenSubject(sub)}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = T.borderStrong; e.currentTarget.style.boxShadow = '0 2px 8px rgba(15,23,42,.04)'; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.boxShadow = 'none'; }}
            >
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, lineHeight: 1.3 }}>{sub.subject_name}</div>
                  <div style={{ fontSize: 11.5, color: T.textMuted, marginTop: 2, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                    <Icons.user size={11} />{sub.teacher}
                  </div>
                </div>
                <div style={{
                  padding: '3px 8px', borderRadius: 999, background: toneBg(p), color: toneText(p),
                  fontWeight: 700, fontSize: 12, fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap',
                }}>{p.toFixed(1)}%</div>
              </div>
              <div style={{ marginBottom: 8 }}>
                <Progress value={Math.min(p, 100)} max={100} color={tone(p)} height={4} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 11.5, color: T.textMuted }}>
                <span>
                  <span style={{ color: T.text, fontWeight: 500 }}>{sub.subject_summary.attended}</span>
                  <span> / {sub.subject_summary.total} dars</span>
                  {sub.subject_summary.absent > 0 && (
                    <span style={{ color: T.redDeep, marginLeft: 8 }}>{sub.subject_summary.absent} ta qoldirgan</span>
                  )}
                </span>
                <span style={{ color: T.text, fontWeight: 500, display: 'inline-flex', alignItems: 'center', gap: 3 }}>
                  Tafsilot <Icons.arrowRight size={11} />
                </span>
              </div>
            </div>
          );
        })}
      </div>

      <SubjectDetailDialog subject={openSubject} onClose={() => setOpenSubject(null)} />
    </Card>
  );
}

function SubjectDetailDialog({ subject, onClose }) {
  if (!subject) return null;
  const p = subject.subject_summary.percentage;
  return (
    <Dialog open={!!subject} onClose={onClose} size="lg"
      title={subject.subject_name}
      description={`${subject.teacher} · ${subject.subject_summary.attended}/${subject.subject_summary.total} dars · ${p.toFixed(1)}% davomat`}
      footer={<Button variant="primary" onClick={onClose}>Yopish</Button>}
    >
      <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
        <div style={{ flex: 1, padding: 12, background: T.emeraldBg, borderRadius: 8 }}>

              ))}
            </tr>
          </thead>
          <tbody>
            {subject.logs.map((log, i) => (
              <tr key={i} style={{ borderBottom: i < subject.logs.length - 1 ? `1px solid ${T.border}` : 'none' }}>

                <td style={{ padding: '8px 12px', color: T.textMuted, fontVariantNumeric: 'tabular-nums' }}>{log.time}</td>
                <td style={{ padding: '8px 12px' }}>
                  {log.status === 'attended' ? (
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, color: T.emeraldDeep, fontWeight: 500 }}>
                      <Icons.check size={13} stroke={T.emerald} strokeWidth={2.5} /> Qatnashgan
                    </span>
                  ) : (
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, color: T.redDeep, fontWeight: 500 }}>

function PageStudentAchievements() {
  const s = useStore();
  const myList = s.achievements.filter(a => a.studentId === ME_STUDENT.id)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  const [filter, setFilter] = React.useState('all'); // all | pending | approved | rejected
  const filtered = myList.filter(a =>
    filter === 'all' ? true :
    filter === 'pending'  ? a.status === 'PENDING' :
    filter === 'approved' ? a.status === 'APPROVED' :
    a.status === 'REJECTED'
  );

  const [dialogOpen, setDialogOpen] = React.useState(false);
  const [form, setForm] = React.useState({ type: 'CERTIFICATE', title: '', desc: '', date: '2026-05-14', file: null });

  const submit = () => {
    if (!form.title.trim()) { s.toast({ kind: 'error', title: 'Yutuq nomini kiriting' }); return; }
    s.addAchievement({
      studentId: ME_STUDENT.id,
      type: form.type,
      title: form.title,
      desc: form.desc,
      date: form.date,
      file: form.file,
    });
    s.toast({ kind: 'success', title: 'Yutuq qo‘shildi', description: 'Admin tasdiqlashini kuting' });
    setDialogOpen(false);
    setForm({ type: 'CERTIFICATE', title: '', desc: '', date: '2026-05-14', file: null });
  };

  const total = { all: myList.length, pending: myList.filter(a => a.status === 'PENDING').length, approved: myList.filter(a => a.status === 'APPROVED').length, rejected: myList.filter(a => a.status === 'REJECTED').length };
  const totalPoints = myList.filter(a => a.status === 'APPROVED').reduce((sum, a) => sum + (a.points || 0), 0);

  return (
    <AppShell breadcrumb={['Student', 'Yutuqlar']}>
      <PageTitle title="Yutuqlar" desc="Sertifikat, hakaton, startap, ish va boshqa yutuqlar — tasdiqdan o‘tgach grant ballingizga qo‘shiladi" actions={
        <Button variant="primary" icon={<Icons.plus size={14} />} onClick={() => setDialogOpen(true)}>Yangi yutuq</Button>
      } />

      {/* Summary cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 14 }}>
        <KpiCard label="Jami yutuqlar"   value={total.all}      icon={<Icons.award size={14} />} />
        <KpiCard label="Tasdiqlangan"     value={total.approved} accent={T.emeraldDeep} icon={<Icons.check size={14} />} />
        <KpiCard label="Kutilmoqda"       value={total.pending}  accent={T.amberDeep}   icon={<Icons.clock size={14} />} />
        <KpiCard label="Olingan ball"     value={`+${totalPoints}`} sub="ball" accent={T.emeraldDeep} icon={<Icons.zap size={14} />} />
      </div>

      <Card padding={0}>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <Tabs
            value={filter}
            onChange={setFilter}
            items={[
              { id: 'all',      label: 'Hammasi',      count: total.all },
              { id: 'pending',  label: 'Kutilmoqda',   count: total.pending },
              { id: 'approved', label: 'Tasdiqlangan', count: total.approved },
              { id: 'rejected', label: 'Rad etilgan',  count: total.rejected },
            ]}
          />
        </div>

        {filtered.length === 0 ? (
          <Empty
            icon={Icons.award}
            title="Hozircha yutuqlar yo‘q"
            desc="Sertifikat, hakaton yoki boshqa yutuqlaringizni qo‘shing — admin tasdiqlagandan keyin ball qo‘shiladi"
            action={<Button variant="primary" icon={<Icons.plus size={14}/>} onClick={() => setDialogOpen(true)}>Yangi yutuq qo'shish</Button>}
          />
        ) : (
          <div>
            {filtered.map((a, i) => {
              const Ico = Icons[TYPE_ICON_KEY[a.type]] || Icons.star;
              return (
                <div key={a.id} style={{
                  padding: '16px 18px', display: 'flex', alignItems: 'flex-start', gap: 14,
                  borderBottom: i < filtered.length - 1 ? `1px solid ${T.border}` : 'none',
                }}>
                  <div style={{ width: 40, height: 40, borderRadius: 9, background: T.bg, border: `1px solid ${T.border}`, display: 'grid', placeItems: 'center', flexShrink: 0, color: T.text }}>
                    <Ico size={17} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{a.title}</div>
                      <Badge variant="muted" size="sm">{TYPE_LABEL[a.type]}</Badge>
                    </div>
                    {a.desc && <div style={{ fontSize: 12.5, color: T.textMuted, marginTop: 4 }}>{a.desc}</div>}
                    <div style={{ fontSize: 11.5, color: T.textSubtle, marginTop: 6, display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><Icons.cal size={11} />{fmtDate(a.date)}</span>
                      {a.file && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><Icons.file size={11} />{a.file}</span>}
                    </div>
                    {a.status === 'REJECTED' && a.reject && (
                      <div style={{ marginTop: 8, padding: '8px 10px', background: T.redBg, borderRadius: 6, fontSize: 12, color: T.redText, display: 'flex', gap: 6 }}>
                        <Icons.alert size={13} stroke={T.red} style={{ marginTop: 2 }} />
                        <div><strong>Rad etish sababi:</strong> {a.reject}</div>
                      </div>
                    )}
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6, flexShrink: 0 }}>
                    <Badge status={a.status} />
                    {a.status === 'APPROVED' && <div style={{ fontSize: 13, fontWeight: 600, color: T.emeraldDeep, fontVariantNumeric: 'tabular-nums' }}>+{a.points} ball</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Card>

      {/* Add achievement dialog */}
      <Dialog open={dialogOpen} onClose={() => setDialogOpen(false)}
        title="Yangi yutuq qo'shish"
        description="Sertifikat, hakaton, startap, ish yoki boshqa yutuqni qo'shing. Admin tasdiqlagandan so'ng ball qo'shiladi."
        footer={<>
          <Button variant="outline" onClick={() => setDialogOpen(false)}>Bekor qilish</Button>
          <Button variant="primary" onClick={submit} icon={<Icons.plus size={14} />}>Qo'shish</Button>
        </>}
      >

function PageStudentFeedbacks() {
  const s = useStore();
  const myFb = s.feedbacks.filter(f => f.studentId === ME_STUDENT.id)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  const [period, setPeriod] = React.useState('all');
  const now = new Date('2026-05-15');
  const filtered = myFb.filter(f => {
    if (period === 'all') return true;
    const days = (now - new Date(f.date)) / 86400000;
    if (period === 'month') return days <= 31;
    if (period === 'semester') return days <= 120;
    return true;
  });

  const avg = myFb.length ? (myFb.reduce((a, f) => a + f.score, 0) / myFb.length) : 0;

  return (
    <AppShell breadcrumb={['Student', 'Feedback’lar']}>
      <PageTitle title="Mentor feedback‘lari" desc="Tyutoringizdan kelgan baholar va izohlar" />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 14 }}>
        <KpiCard label="Jami feedback"  value={myFb.length}                            icon={<Icons.message size={14} />} />
        <KpiCard label="O‘rtacha baho" value={avg.toFixed(1)}      sub="/ 5"          accent={T.amberDeep} icon={<Icons.star filled size={14} />} />
        <KpiCard label="So‘nggi"         value={myFb[0] ? fmtRelative(myFb[0].date) : '—'} icon={<Icons.clock size={14} />} />
      </div>

      <Card padding={0}>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <Tabs value={period} onChange={setPeriod} items={[
            { id: 'all',      label: 'Hammasi' },
            { id: 'semester', label: 'Bu semestr' },
            { id: 'month',    label: 'Oxirgi oy' },
          ]} />
        </div>
        {filtered.length === 0 ? (
          <Empty icon={Icons.message} title="Bu davrda feedback yo‘q" desc="Mentoringiz keyingi feedback‘ni qoldirganda shu yerda ko‘rinadi" />

                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
                    <Avatar name={mentor?.name || 'Mentor'} color="#bfdbfe" size={36} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 500 }}>{mentor?.name || 'Mentor'}</div>
                      <div style={{ fontSize: 11.5, color: T.textMuted }}>{fmtDate(f.date)} · {fmtRelative(f.date)}</div>

                    </div>
                  </div>
                  <p style={{ margin: '4px 0 0 48px', fontSize: 13.5, lineHeight: 1.65, color: T.text }}>{f.text}</p>

        )}

  const scoreOf = (x) => (x.breakdown && x.breakdown.finalScore != null) ? x.breakdown.finalScore : x.score;

  const groupStudents  = s.students.filter(x => x.group === me.group);
  const direction      = me.group.split('-')[0];                       // e.g. "FE"
  const courseStudents = s.students.filter(x => x.group.startsWith(direction + '-'));
  const allStudents    = s.students;

  const rankIn = (arr) => {
    const sorted = [...arr].sort((a, b) => scoreOf(b) - scoreOf(a));

// Reusable certificate card
function CertCard({ cert, readOnly, onView }) {
  const isPdf = cert.fileType === 'pdf';
  const isImg = cert.fileType === 'png' || cert.fileType === 'jpg';
  return (
    <div onClick={() => onView?.(cert)} style={{
      border: `1px solid ${T.border}`, borderRadius: 10, padding: 14, background: T.white,
      cursor: 'pointer', transition: 'border-color .15s, box-shadow .15s', display: 'flex', flexDirection: 'column',
    }}
    onMouseEnter={(e) => { e.currentTarget.style.borderColor = T.borderStrong; e.currentTarget.style.boxShadow = '0 2px 8px rgba(15,23,42,.04)'; }}
    onMouseLeave={(e) => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.boxShadow = 'none'; }}
    >
      {/* File preview thumbnail */}
      <div style={{
        height: 100, borderRadius: 8, marginBottom: 12,
        background: isPdf ? '#fef2f2' : '#eff6ff',
        border: `1px solid ${T.border}`,
        display: 'grid', placeItems: 'center',
        position: 'relative', overflow: 'hidden',
      }}>
        {isPdf
          ? <Icons.fileText size={32} stroke={T.red} />
          : isImg ? <Icons.empty size={32} stroke={T.blue} />
          : <Icons.file size={32} stroke={T.textMuted} />}
        <span style={{ position: 'absolute', bottom: 6, right: 8, fontSize: 9, color: T.textMuted, fontFamily: 'JetBrains Mono, monospace', padding: '1px 5px', background: 'rgba(255,255,255,.85)', borderRadius: 3 }}>
          .{cert.fileType?.toUpperCase() || 'FILE'}
        </span>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 6, marginBottom: 4 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, lineHeight: 1.3, flex: 1 }}>{cert.name}</div>
        <Badge status={cert.status} size="sm" />
      </div>
      <div style={{ fontSize: 11.5, color: T.textMuted, marginBottom: 8 }}>
        {CERT_TYPE_LABEL[cert.type] || cert.type} · {fmtDate(cert.date)}
      </div>
      {cert.status === 'REJECTED' && cert.reject && (
        <Tooltip content={cert.reject}>
          <span style={{ fontSize: 11, color: T.redDeep, display: 'inline-flex', alignItems: 'center', gap: 4, cursor: 'help', marginTop: 'auto' }}>
            <Icons.alert size={12} /> Sababni ko‘rsatish
          </span>
        </Tooltip>
      )}
      {!readOnly && cert.status !== 'REJECTED' && (
        <div style={{ marginTop: 'auto', paddingTop: 8, borderTop: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 11.5, color: T.textMuted }}>
          <span>{cert.file}</span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color: T.text, fontWeight: 500 }}>
            Ko‘rish <Icons.arrowRight size={11} />
          </span>
        </div>
      )}
    </div>
  );
}

<script type="text/babel" data-src="pages-mentor.jsx">

// Helper: mentor's groups + their students
const useMentorScope = () => {
  const s = useStore();
  const mentor = ME_MENTOR;

  const students = s.students.filter(x => groupSet.has(x.group));
  return { mentor, students };
};

function PageMentorDashboard() {
  const s = useStore();
  const { mentor, students } = useMentorScope();
  const R = window.Recharts;

  const avgScore = Math.round(students.reduce((a, b) => a + b.score, 0) / Math.max(1, students.length));
  const avgGpa   = Math.round(students.reduce((a, b) => a + b.gpa,   0) / Math.max(1, students.length));
  const avgAtt   = Math.round(students.reduce((a, b) => a + b.attendance, 0) / Math.max(1, students.length));
  const risk     = students.filter(x => x.gpa < 80).length;
  const granted  = students.filter(x => x.status === 'GRANTED').length;

  const sorted = [...students].sort((a, b) => b.score - a.score);
  const top5    = sorted.slice(0, 5);
  const bottom5 = sorted.slice(-5).reverse();

  // Mini distribution for chart
  const grouped = mentor.groups.map(g => {
    const arr = students.filter(x => x.group === g);
    return {
      group: g,
      ball: arr.length ? Math.round(arr.reduce((a, b) => a + b.score, 0) / arr.length) : 0,
      gpa:  arr.length ? Math.round(arr.reduce((a, b) => a + b.gpa,   0) / arr.length) : 0,

  return (

        <KpiCard label="O‘rtacha ball" value={avgScore}                trend={`GPA o'rtacha ${avgGpa}%`} trendUp={null} icon={<Icons.bar size={14} />} />
        <KpiCard label="Risk zonasi"    value={risk}                   sub="GPA<80" trend={risk > 3 ? 'E’tibor talab' : 'Yaxshi'} trendUp={risk <= 3} accent={risk > 3 ? T.amberDeep : T.text} icon={<Icons.alert size={14} />} />
        <KpiCard label="Davomat"        value={`${avgAtt}%`}           trend="Bu hafta"  trendUp={null} icon={<Icons.cal size={14} />} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
